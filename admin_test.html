<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5}
.header{position:fixed;top:0;left:0;right:0;height:50px;background:#2E7D32;color:white;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;z-index:100}
.container{padding:60px 16px;max-width:750px;margin:0 auto}
.login-card{background:white;border-radius:12px;padding:32px 24px;margin:20px 0}
.login-title{font-size:20px;font-weight:bold;margin-bottom:24px;text-align:center}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:14px;color:#333;margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.btn{padding:12px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;width:100%;margin-top:8px}
</style>
</head>
<body>
<div class="header">&#128281; 后台管理</div>
<div class="container" id="mainContainer">加载中...</div>
<script src="cloud_db.js"></script>
<script>
var Storage={get:function(k,d){try{var v=localStorage.getItem("village_"+k);return v?JSON.parse(v):d}catch(e){return d}},set:function(k,v){localStorage.setItem("village_"+k,JSON.stringify(v))}};
var ADMIN_ACCOUNT="admin";
var ADMIN_PASSWORD="admin123";
var isLoggedIn=false;
var container=document.getElementById("mainContainer");
function showLogin(){
  container.innerHTML=
    "<div class='login-card'>"+
    "<div class='login-title'>&#128272; 管理员登录</div>"+
    "<div class='form-group'><label class='form-label'>账号</label><input class='form-input' id='aA' placeholder='管理员账号' value='admin'></div>"+
    "<div class='form-group'><label class='form-label'>密码</label><input class='form-input' id='aP' type='password' placeholder='密码' value='admin123'></div>"+
    "<button class='btn' onclick='adminLogin()'>&#76705; 登录</button>"+
    "</div>";
}
function adminLogin(){
  var acc=document.getElementById("aA").value.trim();
  var pwd=document.getElementById("aP").value.trim();
  if(acc===ADMIN_ACCOUNT&&pwd===ADMIN_PASSWORD){
    isLoggedIn=true;
    showAdminPanel();
  }else{
    alert("账号密码错误");
  }
}
function showAdminPanel(){
  container.innerHTML="<div class='login-card'><div style='font-size:20px;font-weight:bold;text-align:center;padding:40px;'>&#128079; 管理员面板</div><div style='text-align:center;color:#666;margin-top:20px;'>登录成功！</div></div>";
}
showLogin();
</script>
</body>
</html>

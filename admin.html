<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#333;font-size:14px;}
.header{background:#37474F;color:#fff;padding:12px 16px;font-size:18px;font-weight:bold;text-align:center;position:fixed;top:0;left:0;right:0;z-index:100;}
.container{padding:60px 16px 20px;max-width:600px;margin:0 auto;}
.card{background:#fff;border-radius:12px;padding:20px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
input[type="text"],input[type="password"],textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:14px;}
button{width:100%;padding:12px;background:#37474F;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px;}
.tab{display:flex;background:#fff;border-radius:8px;overflow:hidden;margin:10px 0;}
.tab-item{flex:1;text-align:center;padding:10px;cursor:pointer;}
.tab-item.active{background:#37474F;color:#fff;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:5px;}
.badge-w{background:#FF9800;color:#fff;}
.badge-g{background:#4CAF50;color:#fff;}
</style>
</head>
<body>
<div class="header">⚙️ 后台管理</div>
<div class="container" id="app"></div>

<script>
// 本地存储操作
var S = {
  get: function(k, def) {
    try { var v = localStorage.getItem('village_' + k); return v ? JSON.parse(v) : def; } catch(e) { return def; }
  },
  set: function(k, v) {
    try { localStorage.setItem('village_' + k, JSON.stringify(v)); return true; } catch(e) { return false; }
  }
};

var ADMIN_USER = S.get('admin_user', 'admin');
var ADMIN_PWD = S.get('admin_pwd', 'admin123');
var isLogin = sessionStorage.getItem('village_admin_logged') === 'true';
var curTab = 'chiefs';

// 渲染登录页
function renderLogin() {
  document.getElementById('app').innerHTML = 
    '<div class="card">' +
      '<h2 style="text-align:center;color:#37474F;">🔐 管理员登录</h2>' +
      '<input type="text" id="user" placeholder="账号" value="' + ADMIN_USER + '">' +
      '<input type="password" id="pwd" placeholder="密码">' +
      '<button onclick="doLogin()">登录</button>' +
    '</div>';
}

// 登录
window.doLogin = function() {
  var u = document.getElementById('user').value;
  var p = document.getElementById('pwd').value;
  if (u === ADMIN_USER && p === ADMIN_PWD) {
    isLogin = true;
    sessionStorage.setItem('village_admin_logged', 'true');
    renderAdmin();
  } else {
    alert('账号或密码错误');
  }
};

// 渲染管理界面
function renderAdmin() {
  var regs = S.get('registrations', []);
  var villages = S.get('villages', []);
  var announce = S.get('announcements', []);
  
  var html = '';
  html += '<div class="tab">';
  html += '<div class="tab-item' + (curTab==='chiefs'?' active':'') + '" onclick="switchTab(\'chiefs\')">村主任</div>';
  html += '<div class="tab-item' + (curTab==='roles'?' active':'') + '" onclick="switchTab(\'roles\')">其他角色</div>';
  html += '<div class="tab-item' + (curTab==='villages'?' active':'') + '" onclick="switchTab(\'villages\')">村庄</div>';
  html += '<div class="tab-item' + (curTab==='announce'?' active':'') + '" onclick="switchTab(\'announce\')">公告</div>';
  html += '</div>';
  
  if (curTab === 'chiefs') {
    var chiefs = regs.filter(function(r) { return (r.role || r.type) === '村主任'; });
    if (!chiefs.length) { html += '<div class="card">暂无村主任申请</div>'; }
    else {
      chiefs.forEach(function(r) {
        html += '<div class="card">' +
          '<strong>' + (r.name || r.chiefName || '?') + '</strong>' +
          (r.status === '待审核' ? 
            '<span class="badge badge-w">待审核</span>' :
            r.status === '已通过' ?
            '<span class="badge badge-g">已通过</span>' :
            '<span class="badge badge-r">已拒绝</span>') +
          '<p>村庄:' + (r.village || '?') + ' | 电话:' + (r.phone || '?') + '</p>' +
          (r.status === '待审核' ? 
            '<button onclick="approve(\'' + r.id + '\')">通过</button>' +
            '<button onclick="reject(\'' + r.id + '\')">拒绝</button>' : '') +
        '</div>';
      });
    }
  } else if (curTab === 'roles') {
    var others = regs.filter(function(r) { return (r.role || r.type) !== '村主任' && r.role !== '管理员'; });
    if (!others.length) { html += '<div class="card">暂无其他角色申请</div>'; }
    else {
      others.forEach(function(r) {
        html += '<div class="card">' +
          '<strong>' + (r.name || '?') + '</strong> (' + (r.role || r.type || '?') + ')' +
          (r.status === '待审核' ? 
            '<span class="badge badge-w">待审核</span>' :
            r.status === '已通过' ?
            '<span class="badge badge-g">已通过</span>' :
            '<span class="badge badge-r">已拒绝</span>') +
          '<p>村庄:' + (r.village || '?') + '</p>' +
          (r.status === '待审核' ? 
            '<button onclick="approve(\'' + r.id + '\')">通过</button>' +
            '<button onclick="reject(\'' + r.id + '\')">拒绝</button>' : '') +
        '</div>';
      });
    }
  } else if (curTab === 'villages') {
    if (!villages.length) { html += '<div class="card">暂无村庄</div>'; }
    else {
      villages.forEach(function(v) {
        html += '<div class="card">' +
          '<strong>' + (v.name || '?') + '</strong>' +
          '<p>村长:' + (v.chiefName || '?') + ' | 电话:' + (v.phone || '?') + '</p>' +
        '</div>';
      });
    }
  } else if (curTab === 'announce') {
    var villages = S.get('villages', []);
    var villageCheckboxes = '';
    if (villages.length) {
      villageCheckboxes = '<p>发布到村庄（不选则全平台显示）：</p>';
      villages.forEach(function(v) {
        villageCheckboxes += '<label><input type="checkbox" value="' + v.name + '"> ' + v.name + '</label><br>';
      });
    }
    html += '<div class="card">' +
      '<h3>📢 发布公告</h3>' +
      '<input type="text" id="announceTitle" placeholder="公告标题">' +
      '<textarea id="announceContent" placeholder="公告内容" rows="4"></textarea>' +
      villageCheckboxes +
      '<button onclick="saveAnnounce()">发布</button>' +
    '</div>';
    if (announce.length) {
      announce.forEach(function(a) {
        html += '<div class="card">' +
          '<strong>' + (a.title || '无标题') + '</strong>' +
          '<p>' + (a.text || a.content || '') + '</p>' +
          '<button onclick="deleteAnnounce(\'' + a.id + '\')">删除</button>' +
        '</div>';
      });
    }
  }
  
  html += '<div class="card">' +
    '<h3>⚙️ 设置</h3>' +
    '<input type="text" id="newUser" placeholder="新账号（留空不改）">' +
    '<input type="password" id="newPwd" placeholder="新密码（留空不改）">' +
    '<button onclick="saveSettings()">保存设置</button>' +
  '</div>';
  
  document.getElementById('app').innerHTML = html;
}

// 切换标签
window.switchTab = function(tab) {
  curTab = tab;
  renderAdmin();
};

// 通过审核
window.approve = function(id) {
  var regs = S.get('registrations', []);
  for (var i = 0; i < regs.length; i++) {
    if (regs[i].id == id) {
      regs[i].status = '已通过';
      // 如果是村主任，添加到村庄列表
      if ((regs[i].role || regs[i].type) === '村主任') {
        var villages = S.get('villages', []);
        villages.push({
          id: regs[i].id,
          name: regs[i].village,
          chiefName: regs[i].name,
          phone: regs[i].phone,
          status: '已通过'
        });
        S.set('villages', villages);
      }
      break;
    }
  }
  S.set('registrations', regs);
  renderAdmin();
};

// 拒绝审核
window.reject = function(id) {
  var regs = S.get('registrations', []);
  for (var i = 0; i < regs.length; i++) {
    if (regs[i].id == id) { regs[i].status = '已拒绝'; break; }
  }
  S.set('registrations', regs);
  renderAdmin();
};

// 保存公告
window.saveAnnounce = function() {
  var title = document.getElementById('announceTitle').value.trim();
  var content = document.getElementById('announceContent').value.trim();
  if (!title || !content) { alert('请填写完整'); return; }
  
  // 获取勾选的村庄
  var checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
  var selectedVillages = [];
  for (var i = 0; i < checkboxes.length; i++) {
    selectedVillages.push(checkboxes[i].value);
  }
  
  var announce = S.get('announcements', []);
  announce.unshift({
    id: 'a_' + Date.now(),
    title: title,
    text: content,
    villages: selectedVillages,
    time: new Date().toLocaleString()
  });
  S.set('announcements', announce);
  renderAdmin();
};

// 删除公告
window.deleteAnnounce = function(id) {
  if (!confirm('确定删除？')) return;
  var announce = S.get('announcements', []);
  announce = announce.filter(function(a) { return a.id !== id; });
  S.set('announcements', announce);
  renderAdmin();
};

// 保存设置
window.saveSettings = function() {
  var newUser = document.getElementById('newUser').value.trim();
  var newPwd = document.getElementById('newPwd').value;
  
  if (newUser) {
    S.set('admin_user', newUser);
    ADMIN_USER = newUser;
  }
  if (newPwd) {
    S.set('admin_pwd', newPwd);
    ADMIN_PWD = newPwd;
  }
  alert('设置已保存');
  renderAdmin();
};

// 启动
if (isLogin) { renderAdmin(); } else { renderLogin(); }
</script>
</body>
</html>

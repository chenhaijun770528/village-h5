<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>еҗҺеҸ°з®ЎзҗҶ</title>
  <style>/* village-h5 е…ЁеұҖж ·ејҸ */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background-color: #f5f5f5;
  color: #333;
  font-size: 14px;
  line-height: 1.5;
}

/* йЎ¶йғЁеҜјиҲӘ */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #37474F, #546E7A);
  color: white;
  padding: 12px 16px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-title { font-size: 18px; font-weight: bold; }
.header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* дё»е®№еҷЁ */
.container {
  padding: 60px 16px 80px;
  max-width: 750px;
  margin: 0 auto;
}

/* зҷ»еҪ•еҚЎзүҮ */
.login-card {
  background: white;
  border-radius: 12px;
  padding: 32px 24px;
  margin: 20px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.login-title {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #37474F;
  margin-bottom: 24px;
}

/* иЎЁеҚ•ж ·ејҸ */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; font-weight: bold; }
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: #546E7A; }

.btn-admin {
  width: 100%;
  padding: 12px;
  background: #37474F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}

.btn-admin:active { background: #263238; }

/* TabеҲҮжҚў */
.tab-nav {
  display: flex;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.tab-nav-item {
  flex: 1;
  text-align: center;
  padding: 10px 8px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  border-right: 1px solid #eee;
  transition: all 0.2s;
}

.tab-nav-item:last-child { border-right: none; }
.tab-nav-item.active {
  background: #37474F;
  color: white;
  font-weight: bold;
}

/* з»ҹи®ЎеҚЎзүҮ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.stat-card {
  background: white;
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.stat-value { font-size: 24px; font-weight: bold; color: #37474F; }
.stat-label { font-size: 12px; color: #999; margin-top: 4px; }

/* жқ‘еә„еҚЎзүҮ */
.village-card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.village-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.village-card-name { font-size: 15px; font-weight: bold; color: #333; }
.village-card-chief { font-size: 12px; color: #666; }
.village-card-stats {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: #999;
  flex-wrap: wrap;
}

.village-card-stat { color: #37474F; font-weight: bold; }

/* е®Ўж ёз”іиҜ·еҚЎзүҮ */
.app-card {
  background: white;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #FF9800;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.app-card-name { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 4px; }
.app-card-info { font-size: 12px; color: #999; margin-bottom: 8px; }
.app-card-actions { display: flex; gap: 8px; }
.app-card-actions button {
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  font-weight: bold;
}

.app-card-actions .btn-approve { background: #4CAF50; color: white; flex: 1; }
.app-card-actions .btn-reject { background: #F44336; color: white; flex: 1; }

/* з©әзҠ¶жҖҒ */
.empty-state { text-align: center; padding: 40px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

/* ToastжҸҗзӨә */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* йҡҗи—Ҹ */
.hidden { display: none; }
</style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">вҶҗ</span>
    <span class="header-title">вҡҷпёҸ еҗҺеҸ°з®ЎзҗҶ</span>
    <span style="width:40px"></span>
  </div>

  <div class="container" id="mainContainer">
    <!-- еҠ иҪҪдёӯ -->
  </div>

  <script>// village-h5 ж•°жҚ®еӯҳеӮЁ
var Storage = {
  get: function(key, defaultVal) {
    try {
      var v = localStorage.getItem('village_' + key);
      return v ? JSON.parse(v) : defaultVal;
    } catch(e) { return defaultVal; }
  },
  set: function(key, val) {
    localStorage.setItem('village_' + key, JSON.stringify(val));
  }
};

// е·Ҙе…·еҮҪж•°
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function toast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, duration);
}

// з®ЎзҗҶе‘ҳиҙҰеҸ·пјҲж”ҜжҢҒдҝ®ж”№пјҢеӯҳеӮЁеңЁlocalStorageпјү
var ADMIN_ACCOUNT = localStorage.getItem('village_admin_account') || 'admin';
var ADMIN_PASSWORD = localStorage.getItem('village_admin_password') || 'admin123';

// еҪ“еүҚзҠ¶жҖҒ
var isLoggedIn = false;
var currentTab = 'villages';

// еҲқе§ӢеҢ–
function init() {
  // жЈҖжҹҘжҳҜеҗҰе·Ізҷ»еҪ•пјҲд»ҺsessionStorageпјү
  var savedLogin = sessionStorage.getItem('village_admin_logged');
  if (savedLogin === 'true') {
    isLoggedIn = true;
  }
  loadUI();
}

function loadUI() {
  var container = document.getElementById('mainContainer');

  if (!isLoggedIn) {
    showLogin();
  } else {
    showAdminPanel();
  }
}

// жҳҫзӨәзҷ»еҪ•йЎө
function showLogin() {
  var container = document.getElementById('mainContainer');
  container.innerHTML =
    '<div class="login-card">' +
    '<div class="login-title">рҹ”җ з®ЎзҗҶе‘ҳзҷ»еҪ•</div>' +
    '<div class="form-group">' +
    '<label class="form-label">з®ЎзҗҶе‘ҳиҙҰеҸ·</label>' +
    '<input class="form-input" id="adminAccount" placeholder="иҜ·иҫ“е…Ҙз®ЎзҗҶе‘ҳиҙҰеҸ·" value="admin">' +
    '</div>' +
    '<div class="form-group">' +
    '<label class="form-label">з®ЎзҗҶе‘ҳеҜҶз Ғ</label>' +
    '<input class="form-input" id="adminPassword" type="password" placeholder="иҜ·иҫ“е…Ҙз®ЎзҗҶе‘ҳеҜҶз Ғ" value="admin123">' +
    '</div>' +
    '<button class="btn-admin" onclick="adminLogin()">зҷ»еҪ•</button>' +
    '<div style="text-align:center;font-size:12px;color:#999;margin-top:12px;">' + (ADMIN_ACCOUNT === 'admin' && ADMIN_PASSWORD === 'admin123' ? 'й»ҳи®ӨиҙҰеҸ·пјҡadmin / admin123' : 'иҙҰеҸ·еҜҶз Ғе·Ідҝ®ж”№') + '</div>' +
    '<button onclick="resetAdminAccount()" style="width:100%;margin-top:8px;padding:8px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:8px;font-size:12px;cursor:pointer;">еҝҳи®°еҜҶз ҒпјҹйҮҚзҪ®дёәй»ҳи®ӨиҙҰеҸ·</button>' +
    '</div>';
}

function adminLogin() {
  var account = document.getElementById('adminAccount').value.trim();
  var password = document.getElementById('adminPassword').value.trim();

  if (!account || !password) {
    toast('иҜ·иҫ“е…ҘиҙҰеҸ·е’ҢеҜҶз Ғ');
    return;
  }

  if (account !== ADMIN_ACCOUNT || password !== ADMIN_PASSWORD) {
    toast('иҙҰеҸ·жҲ–еҜҶз Ғй”ҷиҜҜ');
    return;
  }

  isLoggedIn = true;
  sessionStorage.setItem('village_admin_logged', 'true');
  toast('зҷ»еҪ•жҲҗеҠҹ');
  showAdminPanel();
}

// дҝ®ж”№з®ЎзҗҶе‘ҳиҙҰеҸ·еҜҶз Ғ
function showChangeAdmin() {
  var modal = document.createElement('div');
  modal.id = 'changeAdminModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';
  modal.innerHTML =
    '<div style="background:white;border-radius:12px;padding:24px;width:90%;max-width:360px;">' +
    '<div style="font-size:16px;font-weight:bold;color:#333;margin-bottom:16px;">вҡҷпёҸ дҝ®ж”№з®ЎзҗҶе‘ҳиҙҰеҸ·</div>' +
    '<div class="form-group"><label class="form-label">ж–°иҙҰеҸ·</label><input class="form-input" id="newAdminAccount" value="' + ADMIN_ACCOUNT + '" placeholder="иҫ“е…Ҙж–°иҙҰеҸ·"></div>' +
    '<div class="form-group"><label class="form-label">ж–°еҜҶз Ғ</label><input class="form-input" id="newAdminPassword" type="password" placeholder="иҫ“е…Ҙж–°еҜҶз Ғ"></div>' +
    '<div class="form-group"><label class="form-label">зЎ®и®Өж–°еҜҶз Ғ</label><input class="form-input" id="confirmAdminPassword" type="password" placeholder="еҶҚж¬Ўиҫ“е…Ҙж–°еҜҶз Ғ"></div>' +
    '<div style="display:flex;gap:8px;margin-top:16px;">' +
    '<button onclick="saveAdminAccount()" style="flex:1;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">дҝқеӯҳ</button>' +
    '<button onclick="closeChangeAdmin()" style="flex:1;padding:10px;background:#999;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">еҸ–ж¶Ҳ</button>' +
    '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

function closeChangeAdmin() {
  var modal = document.getElementById('changeAdminModal');
  if (modal) modal.remove();
}

function resetAdminAccount() {
  if (!confirm('зЎ®е®ҡйҮҚзҪ®дёәй»ҳи®ӨиҙҰеҸ·пјҹ\nиҙҰеҸ·пјҡadmin\nеҜҶз Ғпјҡadmin123')) return;
  localStorage.removeItem('village_admin_account');
  localStorage.removeItem('village_admin_password');
  location.reload();
}

function saveAdminAccount() {
  var newAccount = document.getElementById('newAdminAccount').value.trim();
  var newPassword = document.getElementById('newAdminPassword').value;
  var confirmPassword = document.getElementById('confirmAdminPassword').value;

  if (!newAccount) { toast('иҙҰеҸ·дёҚиғҪдёәз©ә'); return; }
  if (!newPassword) { toast('иҜ·иҫ“е…Ҙж–°еҜҶз Ғ'); return; }
  if (newPassword !== confirmPassword) { toast('дёӨж¬ЎеҜҶз ҒдёҚдёҖиҮҙ'); return; }
  if (newPassword.length < 4) { toast('еҜҶз ҒиҮіе°‘4дҪҚ'); return; }

  ADMIN_ACCOUNT = newAccount;
  ADMIN_PASSWORD = newPassword;
  localStorage.setItem('village_admin_account', newAccount);
  localStorage.setItem('village_admin_password', newPassword);
  closeChangeAdmin();
  toast('иҙҰеҸ·еҜҶз Ғдҝ®ж”№жҲҗеҠҹпјҢдёӢж¬Ўзҷ»еҪ•з”ҹж•Ҳ');
}

function adminLogout() {
  if (!confirm('зЎ®е®ҡиҰҒйҖҖеҮәзҷ»еҪ•еҗ—пјҹ')) return;
  isLoggedIn = false;
  sessionStorage.removeItem('village_admin_logged');
  showLogin();
}

// жҳҫзӨәз®ЎзҗҶйқўжқҝ
function showAdminPanel() {
  var container = document.getElementById('mainContainer');
  container.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
    '<div style="font-size:16px;font-weight:bold;color:#333;">рҹ‘Ӣ з®ЎзҗҶе‘ҳйқўжқҝ</div>' +
    '<button onclick="showChangeAdmin()" style="padding:4px 12px;background:#2E7D32;color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;margin-right:8px;">вҡҷпёҸ дҝ®ж”№иҙҰеҸ·</button>' +
    '<button onclick="adminLogout()" style="padding:4px 12px;background:#F44336;color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">йҖҖеҮәзҷ»еҪ•</button>' +
    '</div>' +

    '<div class="tab-nav">' +
    '<div class="tab-nav-item active" id="tabVillages" onclick="switchTab(\'villages\')">рҹҸҳпёҸ жқ‘еә„еҲ—иЎЁ</div>' +
    '<div class="tab-nav-item" id="tabChiefApps" onclick="switchTab(\'chiefApps\')">рҹ‘Ө жқ‘й•ҝжіЁеҶҢ</div>' +
    '<div class="tab-nav-item" id="tabRoleApps" onclick="switchTab(\'roleApps\')">рҹ“Ӣ и§’иүІе®Ўж ё</div>' +
    '</div>' +

    '<div id="panelVillages"></div>' +
    '<div id="panelChiefApps" class="hidden"></div>' +
    '<div id="panelRoleApps" class="hidden"></div>';

  loadVillageStats();
}

// TabеҲҮжҚў
function switchTab(tab) {
  var tabs = ['Villages', 'ChiefApps'];
  for (var ti = 0; ti < tabs.length; ti++) {
    var tabEl = document.getElementById('tab' + tabs[ti]);
    if (tabEl) tabEl.classList.remove('active');
  }
  var activeTab = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1, tab.length - (tab.endsWith('Apps') ? 4 : 0)) + (tab.endsWith('Apps') ? 'Apps' : ''));
  // з®ҖеҢ–
  if (tab === 'villages') {
    document.getElementById('tabVillages').classList.add('active');
    document.getElementById('panelVillages').classList.remove('hidden');
    document.getElementById('panelChiefApps').classList.add('hidden');
    loadVillageStats();
  } else if (tab === 'chiefApps') {
    document.getElementById('tabChiefApps').classList.add('active');
    document.getElementById('panelVillages').classList.add('hidden');
    document.getElementById('panelChiefApps').classList.remove('hidden');
    loadChiefApplications();
  } else if (tab === 'roleApps') {
    document.getElementById('tabRoleApps').classList.add('active');
    document.getElementById('tabVillages').classList.remove('active');
    document.getElementById('tabChiefApps').classList.remove('active');
    document.getElementById('panelVillages').classList.add('hidden');
    document.getElementById('panelChiefApps').classList.add('hidden');
    document.getElementById('panelRoleApps').classList.remove('hidden');
    loadRoleApplications();
  }
}

// ========== жқ‘еә„з»ҹи®Ў ==========

function loadVillageStats() {
  var panel = document.getElementById('panelVillages');
  var villages = Storage.get('villages', []);
  var products = Storage.get('products', []);
  var foods = Storage.get('foods', []);
  var camps = Storage.get('camps', []);

  // е…ЁеұҖз»ҹи®Ў
  var totalProducts = products.length;
  var totalFoods = foods.length;
  var totalCamps = camps.length;

  panel.innerHTML =
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="stat-value">' + villages.length + '</div><div class="stat-label">жқ‘еә„жҖ»ж•°</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalProducts + '</div><div class="stat-label">еҶңдә§е“ҒжҖ»ж•°</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalFoods + '</div><div class="stat-label">зҫҺйЈҹжҖ»ж•°</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalCamps + '</div><div class="stat-label">йңІиҗҘжҖ»ж•°</div></div>' +
    '</div>' +

    '<div style="font-size:14px;font-weight:bold;color:#333;margin-bottom:12px;">рҹҸҳпёҸ жқ‘еә„еҲ—иЎЁ</div>';

  if (villages.length === 0) {
    panel.innerHTML += '<div class="empty-state"><span class="empty-icon">рҹҸҳпёҸ</span><div>жҡӮж— жқ‘еә„ж•°жҚ®</div></div>';
    return;
  }

  for (var vi = 0; vi < villages.length; vi++) {
    var v = villages[vi];
    var pCount = 0, fCount = 0, cCount = 0;
    for (var pi = 0; pi < products.length; pi++) {
      if (products[pi].villageId === v.id) pCount++;
    }
    for (var fi = 0; fi < foods.length; fi++) {
      if (foods[fi].villageId === v.id) fCount++;
    }
    for (var ci = 0; ci < camps.length; ci++) {
      if (camps[ci].villageId === v.id) cCount++;
    }

    panel.innerHTML += '<div class="village-card">' +
      '<div class="village-card-header">' +
      '<span class="village-card-name">рҹҸҳпёҸ ' + v.name + '</span>' +
      '</div>' +
      '<div class="village-card-chief">рҹ“һ жқ‘й•ҝпјҡ' + (v.chief ? v.chief.name : 'жҡӮж— ') + (v.chief && v.chief.phone ? ' (' + v.chief.phone + ')' : '') + '</div>' +
      '<div class="village-card-chief">рҹ“Қ ' + (v.province || '') + ' ' + (v.city || '') + ' | дәәеҸЈпјҡ' + (v.population || 'жңӘзҹҘ') + '</div>' +
      '<div class="village-card-stats" style="margin-top:6px;">' +
      '<span>рҹҘ¬ еҶңдә§е“Ғпјҡ<span class="village-card-stat">' + pCount + '</span></span>' +
      '<span>рҹҚң зҫҺйЈҹпјҡ<span class="village-card-stat">' + fCount + '</span></span>' +
      '<span>вӣә йңІиҗҘпјҡ<span class="village-card-stat">' + cCount + '</span></span>' +
      '</div>' +
      '<div style="margin-top:10px;display:flex;gap:8px;">' +
      '<button onclick="deleteVillage(\'' + v.id + '\')" style="flex:1;padding:6px;background:#FFEBEE;color:#F44336;border:1px solid #EF9A9A;border-radius:6px;font-size:12px;cursor:pointer;font-weight:bold;">рҹ—‘пёҸ еҲ йҷӨжқ‘еә„</button>' +
      '</div>' +
      '</div>';
  }
}

// ========== жқ‘й•ҝжіЁеҶҢе®Ўж ё ==========

function loadChiefApplications() {
  var panel = document.getElementById('panelChiefApps');

  // гҖҗдҝ®еӨҚгҖ‘иҜ»еҸ–жӯЈзЎ®зҡ„ storage keyпјҡtownship_applicationsпјҲдёҺregister-township.htmlдёҖиҮҙпјү
  var apps = Storage.get('township_applications', []);
  var pending = [];
  for (var i = 0; i < apps.length; i++) {
    // гҖҗдҝ®еӨҚгҖ‘зҠ¶жҖҒеҖјеҢ№й…Қпјҡ'еҫ…е®Ўж ё'пјҲдёҚжҳҜ'waiting'пјү
    if (apps[i].status === 'еҫ…е®Ўж ё') {
      pending.push(apps[i]);
    }
  }

  var approvedCount = 0;
  var rejectedCount = 0;
  for (var j = 0; j < apps.length; j++) {
    if (apps[j].status === 'е·ІйҖҡиҝҮ') approvedCount++;
    else if (apps[j].status === 'е·ІжӢ’з»қ') rejectedCount++;
  }

  panel.innerHTML =
    '<div class="stats-grid" style="margin-bottom:16px;">' +
    '<div class="stat-card"><div class="stat-value" style="color:#FF9800;">' + pending.length + '</div><div class="stat-label">еҫ…е®Ўж ё</div></div>' +

    return;
  }

  for (var pi = 0; pi < pending.length; pi++) {
    var app = pending[pi];
    // гҖҗдҝ®еӨҚгҖ‘еӯ—ж®өжҳ е°„пјҡapp.name=жқ‘дё»д»»е§“еҗҚпјҢapp.village=жқ‘еә„еҗҚз§°
    panel.innerHTML += '<div class="app-card">' +

// йҖҡиҝҮжқ‘й•ҝжіЁеҶҢз”іиҜ·
function approveChief(appId) {
  if (!confirm('зЎ®е®ҡйҖҡиҝҮжӯӨжқ‘й•ҝжіЁеҶҢз”іиҜ·пјҹжқ‘еә„дҝЎжҒҜе°Ҷиў«еҶҷе…Ҙжқ‘еә„еҲ—иЎЁгҖӮ')) return;

  var apps = Storage.get('township_applications', []);
  var app = null;
  var appIdx = -1;
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) { app = apps[i]; appIdx = i; break; }
  }
  if (!app) { toast('з”іиҜ·дёҚеӯҳеңЁ'); return; }

  // 1. жӣҙж–°з”іиҜ·зҠ¶жҖҒ
  apps[appIdx].status = 'е·ІйҖҡиҝҮ';
  apps[appIdx].reviewTime = Date.now();
  Storage.set('township_applications', apps);

  // 2. еҶҷе…Ҙжқ‘еә„еҲ—иЎЁ
  var villages = Storage.get('villages', []);
  villages.push({
    id: app.id,
    name: app.village || 'жңӘе‘ҪеҗҚжқ‘еә„',
    province: app.province || '',
    city: app.city || '',
    population: '',
    totalArea: '',
    farmlandArea: '',
    description: '',
    chief: { name: app.name, phone: app.phone },
    images: [],
    createTime: Date.now()
  });
  Storage.set('villages', villages);

  // 3. гҖҗж–°еўһгҖ‘еҗҢжӯҘеҲ° village_registrationsпјҲз»ҹдёҖжіЁеҶҢиЎЁпјү
  if (app.accountId) {
    var regs = Storage.get('registrations', []);
    regs.unshift({
      id: app.id,
      accountId: app.accountId,
      accountName: app.accountName || '',
      role: 'жқ‘дё»д»»',
      name: app.name,
      phone: app.phone,
      village: app.village,
      province: app.province || '',
      city: app.city || '',
      status: 'е·ІйҖҡиҝҮ',
      applyTime: app.applyTime || Date.now(),
      reviewTime: Date.now()
    });
    Storage.set('registrations', regs);

    // 4. гҖҗж–°еўһгҖ‘з»ҷз”ЁжҲ·иҙҰеҸ·ејҖйҖҡжқ‘дё»д»»и§’иүІ
    var accounts = Storage.get('accounts', []);
    for (var ai = 0; ai < accounts.length; ai++) {
      if (accounts[ai].id === app.accountId) {
        accounts[ai].currentRole = 'township';
        accounts[ai].currentRoleId = app.id;
        accounts[ai].currentRoleName = app.name;
        break;
      }
    }
    Storage.set('accounts', accounts);
  }

  toast('е·ІйҖҡиҝҮпјҒз”ЁжҲ·и§’иүІе·ІејҖйҖҡпјҢеҸҜзӣҙжҺҘзҷ»еҪ•дҪҝз”Ё');
  loadChiefApplications();
}

// жӢ’з»қжқ‘й•ҝжіЁеҶҢз”іиҜ·
function rejectChief(appId) {
  if (!confirm('зЎ®е®ҡжӢ’з»қжӯӨз”іиҜ·пјҹ')) return;

  var apps = Storage.get('township_applications', []);
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) {
      apps[i].status = 'е·ІжӢ’з»қ';
      apps[i].updateTime = Date.now();
      break;
    }
  }
  Storage.set('township_applications', apps);
  toast('е·ІжӢ’з»қиҜҘз”іиҜ·');
  loadChiefApplications();
}

// ========== еҲ йҷӨжқ‘еә„ ==========
function deleteVillage(villageId) {
  if (!confirm('зЎ®е®ҡеҲ йҷӨжӯӨжқ‘еә„пјҹиҜҘжқ‘еә„дёӢзҡ„жүҖжңүе…іиҒ”ж•°жҚ®д№ҹе°Ҷиў«жё…йҷӨпјҒ')) return;
  var villages = Storage.get('villages', []);
  for (var i = 0; i < villages.length; i++) {
    if (villages[i].id === villageId) { villages.splice(i, 1); break; }
  }
  Storage.set('villages', villages);
  var products = Storage.get('products', []);
  var newP = [];
  for (var pi = 0; pi < products.length; pi++) { if (products[pi].villageId !== villageId) newP.push(products[pi]); }
  Storage.set('products', newP);
  var foods = Storage.get('foods', []);
  var newF = [];
  for (var fi = 0; fi < foods.length; fi++) { if (foods[fi].villageId !== villageId) newF.push(foods[fi]); }
  Storage.set('foods', newF);
  var camps = Storage.get('camps', []);
  var newC = [];
  for (var ci = 0; ci < camps.length; ci++) { if (camps[ci].villageId !== villageId) newC.push(camps[ci]); }
  Storage.set('camps', newC);
  // жё…йҷӨиҜҘжқ‘дё»д»»з”ЁжҲ·иҙҰеҸ·зҡ„и§’иүІз»‘е®ҡ
  var accounts = Storage.get('accounts', []);
  var tApps = Storage.get('township_applications', []);
  for (var ti = 0; ti < tApps.length; ti++) {
    if (tApps[ti].id === villageId) {
      if (tApps[ti].accountId) {
        for (var ai = 0; ai < accounts.length; ai++) {
          if (accounts[ai].id === tApps[ti].accountId) {
            delete accounts[ai].currentRole;
            delete accounts[ai].currentRoleId;
            delete accounts[ai].currentRoleName;
            break;
          }
        }
      }
      break;
    }
  }
  Storage.set('accounts', accounts);
  toast('жқ‘еә„еҸҠе…іиҒ”ж•°жҚ®е·ІеҲ йҷӨпјҢжқ‘дё»д»»и§’иүІе·ІйҮҚзҪ®');
  loadVillageStats();
}

// ========== и§’иүІжіЁеҶҢе®Ўж ё ==========
function loadRoleApplications() {
  var panel = document.getElementById('panelRoleApps');
  var regs = Storage.get('registrations', []);
  var pending = [];
  for (var i = 0; i < regs.length; i++) { if (regs[i].status === 'еҫ…е®Ўж ё') pending.push(regs[i]); }
  var approved = 0, rejected = 0;
  for (var j = 0; j < regs.length; j++) {
    if (regs[j].status === 'е·ІйҖҡиҝҮ') approved++;
    else if (regs[j].status === 'е·ІжӢ’з»қ') rejected++;
  }
  panel.innerHTML =
    '<div class="stats-grid" style="margin-bottom:16px;">' +
    '<div class="stat-card"><div class="stat-value" style="color:#FF9800;">' + pending.length + '</div><div class="stat-label">еҫ…е®Ўж ё</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:#4CAF50;">' + approved + '</div><div class="stat-label">е·ІйҖҡиҝҮ</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:#F44336;">' + rejected + '</div><div class="stat-label">е·ІжӢ’з»қ</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + regs.length + '</div><div class="stat-label">жіЁеҶҢжҖ»ж•°</div></div>' +
    '</div>' +
    '<div style="font-size:14px;font-weight:bold;color:#333;margin-bottom:12px;">рҹ“Ӣ жүҖжңүи§’иүІжіЁеҶҢе®Ўж ё</div>';
  if (pending.length === 0) {
    panel.innerHTML += '<div class="empty-state"><span class="empty-icon">рҹ“Ӣ</span><div>жҡӮж— еҫ…е®Ўж ёзҡ„жіЁеҶҢз”іиҜ·</div></div>';
    return;
  }
  var roleIcons = {'жқ‘ж°‘':'рҹҢҫ','жқ‘дё»д»»':'рҹҸ ','жёёе®ў':'рҹҺ’','еҶңдә§е“Ғе•Ҷе®¶':'рҹҘ¬','е»әзӯ‘йҳҹ':'рҹҸ—пёҸ','иҖҒеёҲ':'рҹ‘©вҖҚрҹҸ«','еӨ§еӯҰз”ҹ':'рҹҺ“','еҫӢеёҲдәӢеҠЎжүҖ':'вҡ–пёҸ','еҫӢеёҲ':'рҹ‘”','иҙ§иҪҰеҸёжңә':'рҹҡӣ','жӢјиҪҰ':'рҹҡ—','жҢүж‘©еёҲ':'рҹ’Ҷ'};
  for (var pi = 0; pi < pending.length; pi++) {
    var reg = pending[pi];
    var icon = roleIcons[reg.role] || 'рҹ‘Ө';
    panel.innerHTML += '<div class="app-card">' +
      '<div class="app-card-name">' + icon + ' ' + (reg.name || 'жңӘзҹҘ') + ' <span style="font-size:12px;color:#FF9800;background:#FFF3E0;padding:1px 8px;border-radius:4px;margin-left:4px;">' + (reg.role || 'жңӘзҹҘ') + '</span></div>' +
      '<div class="app-card-info">жқ‘еә„пјҡ' + (reg.village || 'ж— ') + ' | жүӢжңәпјҡ' + (reg.phone || 'ж— ') + '</div>' +
      '<div class="app-card-info">иҙҰеҸ·пјҡ' + (reg.accountName || reg.accountId || 'ж— ') + ' | ең°еҢәпјҡ' + (reg.province || '') + ' ' + (reg.city || '') + '</div>' +
      '<div class="app-card-actions">' +
      '<button class="btn-approve" onclick="approveRole(\'' + reg.id + '\')">вң… йҖҡиҝҮ</button>' +
      '<button class="btn-reject" onclick="rejectRole(\'' + reg.id + '\')">вқҢ жӢ’з»қ</button>' +
      '<button class="btn-delete" onclick="deleteRole(\'' + reg.id + '\')">рҹ—‘пёҸ еҲ йҷӨ</button>' +
      '</div>' +
      '</div>';
  }

  // рҹ—ғпёҸ е·ІеӨ„зҗҶи®°еҪ•
  var processed = [];
  for (var pi2 = 0; pi2 < regs.length; pi2++) {
    if (regs[pi2].status !== 'еҫ…е®Ўж ё') processed.push(regs[pi2]);
  }
  if (processed.length > 0) {
    panel.innerHTML += '<div style="margin-top:16px;font-size:14px;font-weight:bold;color:#333;margin-bottom:12px;">рҹ“Ӣ е·ІеӨ„зҗҶи®°еҪ•пјҲ' + processed.length + 'жқЎпјү</div>';
    for (var pi3 = 0; pi3 < processed.length; pi3++) {
      var reg2 = processed[pi3];
      var icon2 = roleIcons[reg2.role] || 'рҹ‘Ө';

        '<div class="app-card-name">' + icon2 + ' ' + (reg2.name || 'жңӘзҹҘ') + ' <span style="font-size:12px;color:' + statusColor2 + ';background:' + (reg2.status === 'е·ІйҖҡиҝҮ' ? '#E8F5E9' : '#FFEBEE') + ';padding:1px 8px;border-radius:4px;margin-left:4px;">' + (reg2.role || 'жңӘзҹҘ') + '</span>' +
        ' <span style="font-size:11px;color:' + statusColor2 + ';">[' + reg2.status + ']</span></div>' +

        '<div class="app-card-info">иҙҰеҸ·пјҡ' + (reg2.accountName || reg2.accountId || 'ж— ') + ' | ең°еҢәпјҡ' + (reg2.province || '') + ' ' + (reg2.city || '') + '</div>' +
        '<div class="app-card-actions">' +
        '<button class="btn-delete" onclick="deleteRole(\'' + reg2.id + '\')">рҹ—‘пёҸ еҲ йҷӨ</button>' +
        '</div>' +
        '</div>';
    }
  }
}

function approveRole(regId) {
  if (!confirm('зЎ®е®ҡйҖҡиҝҮжӯӨжіЁеҶҢз”іиҜ·пјҹ')) return;
  var regs = Storage.get('registrations', []);
  var reg = null;
  for (var i = 0; i < regs.length; i++) {
    if (regs[i].id === regId) { reg = regs[i]; regs[i].status = 'е·ІйҖҡиҝҮ'; regs[i].reviewTime = Date.now(); break; }
  }
  Storage.set('registrations', regs);
  if (reg && reg.accountId) {
    var accounts = Storage.get('accounts', []);
    var roleMap = {'жқ‘ж°‘':'villager','жқ‘дё»д»»':'township','жёёе®ў':'tourist','еҶңдә§е“Ғе•Ҷе®¶':'market','е»әзӯ‘йҳҹ':'construction','иҖҒеёҲ':'teacher','еӨ§еӯҰз”ҹ':'student','еҫӢеёҲдәӢеҠЎжүҖ':'law-firm','еҫӢеёҲ':'lawyer','иҙ§иҪҰеҸёжңә':'truck','жӢјиҪҰ':'carpool','жҢүж‘©еёҲ':'massage'};
    for (var ai = 0; ai < accounts.length; ai++) {
      if (accounts[ai].id === reg.accountId) {
        accounts[ai].currentRole = roleMap[reg.role] || reg.role;
        accounts[ai].currentRoleId = reg.id;
        accounts[ai].currentRoleName = reg.name;
        break;
      }
    }
    Storage.set('accounts', accounts);
  }
  toast('е·ІйҖҡиҝҮпјҒ' + (reg ? reg.role : '') + 'и§’иүІе·ІејҖйҖҡ');
  loadRoleApplications();
}



// еҲ йҷӨи§’иүІжіЁеҶҢ
function deleteRole(regId) {
  if (!confirm('зЎ®е®ҡеҲ йҷӨжӯӨи§’иүІжіЁеҶҢи®°еҪ•пјҹиҜҘж“ҚдҪңдёҚеҸҜжҒўеӨҚгҖӮ')) return;
  var regs = Storage.get('registrations', []);
  var reg = null;
  for (var i = 0; i < regs.length; i++) {
    if (regs[i].id === regId) {
      reg = regs[i];
      regs.splice(i, 1);
      break;
    }
  }
  Storage.set('registrations', regs);
  if (reg && reg.accountId) {
    var accounts = Storage.get('accounts', []);
    for (var ai = 0; ai < accounts.length; ai++) {
      if (accounts[ai].id === reg.accountId && accounts[ai].currentRoleId === regId) {
        delete accounts[ai].currentRole;
        delete accounts[ai].currentRoleId;
        delete accounts[ai].currentRoleName;
        break;
      }
    }
    Storage.set('accounts', accounts);
  }
  toast('е·ІеҲ йҷӨи§’иүІжіЁеҶҢи®°еҪ•');
  loadRoleApplications();
}function rejectRole(regId) {
  if (!confirm('зЎ®е®ҡжӢ’з»қжӯӨжіЁеҶҢз”іиҜ·пјҹ')) return;
  var regs = Storage.get('registrations', []);
  for (var i = 0; i < regs.length; i++) {
    if (regs[i].id === regId) {
      regs[i].status = 'е·ІжӢ’з»қ';
      regs[i].reviewTime = Date.now();
      break;
    }
  }
  Storage.set('registrations', regs);
  toast('е·ІжӢ’з»қ');
  loadRoleApplications();
}

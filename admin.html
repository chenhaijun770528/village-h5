  <style>/* village-h5 йҚҸг„Ҙзң¬йҸҚеі°зҙЎ */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

}

/* жӨӨе •е„ҙзҖөиү°еҹ… */
.header {

  left: 0;
  right: 0;
  background: linear-gradient(135deg, #37474F, #546E7A);

/* ж¶“иҜІоҶҗйҚЈ?*/

}

/* йҗ§иҜІз¶ҚйҚ—пј„еў– */

}

.login-title {

/* зҗӣг„ҘеҙҹйҸҚеі°зҙЎ */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; font-weight: bold; }

/* TabйҚ’еӣЁеҙІ */
.tab-nav {

  margin-bottom: 16px;

.tab-nav-item {

/* зјҒзҶ»о…ёйҚ—пј„еў– */
.stats-grid {

}

.stat-card {

}

/* йҸүжҲқз°һйҚ—пј„еў– */
.village-card {

  border-radius: 12px;

  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.village-card-header {

}

  font-size: 12px;

}

/* зҖ№в„ғзүійҗўе® оҮ¬йҚ—пј„еў– */
.app-card {
  background: white;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #FF9800;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.app-card-name { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 4px; }
.app-card-info { font-size: 12px; color: #999; margin-bottom: 8px; }
.app-card-actions { display: flex; gap: 8px; }
.app-card-actions button {
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  font-weight: bold;
}

.app-card-actions .btn-approve { background: #4CAF50; color: white; flex: 1; }
.app-card-actions .btn-reject { background: #F44336; color: white; flex: 1; }

/* з»Ңиҷ№е§ёйҺ¬?*/
.empty-state { text-align: center; padding: 40px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

/* ToastйҺ»ж„®гҒҡ */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;

}

@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* й—…ж„ҜжЈҢ */
.hidden { display: none; }

<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">йҲ«?/span>
    <span class="header-title">йҲҝж¬ҷз¬Қ йҚҡеәЎеҪҙз» пј„жӮҠ</span>
    <span style="width:40px"></span>
  </div>

  <div class="container" id="mainContainer">
    <!-- йҚ”зҠәжөҮж¶“?-->
  </div>

  <script>// village-h5 йҸҒзүҲеөҒзҖӣжЁәеҒҚ
var Storage = {
  get: function(key, defaultVal) {
    try {
      var v = localStorage.getItem('village_' + key);
      return v ? JSON.parse(v) : defaultVal;
    } catch(e) { return defaultVal; }
  },
  set: function(key, val) {
    localStorage.setItem('village_' + key, JSON.stringify(val));
  }
};

// е®ёгғҘеҸҝйҚ‘иҠҘжҡҹ
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function toast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, duration);
}

// з» пј„жӮҠйҚӣжЁҝеӨ„йҚҷеҮӨзҙҷзәӯо„ӮзҙӘйҗ®дҫҠзҙҡ
var ADMIN_ACCOUNT = 'admin';
var ADMIN_PASSWORD = 'admin123';

// иӨ°ж’іеў йҗҳиҲөвӮ¬?var isLoggedIn = false;
var currentTab = 'villages';

// йҚ’жҝҶоқҗйҚ–?function init() {
  // еҰ«вӮ¬йҸҢгғҰж§ёйҚҡп№ҖеҮЎйҗ§иҜІз¶Қй”ӣе ңзІ sessionStorageй”ӣ?  var savedLogin = sessionStorage.getItem('village_admin_logged');
  if (savedLogin === 'true') {
    isLoggedIn = true;
  }
  loadUI();
}

function loadUI() {
  var container = document.getElementById('mainContainer');

  if (!isLoggedIn) {
    showLogin();
  } else {
    showAdminPanel();
  }
}

// йҸ„еү§гҒҡйҗ§иҜІз¶ҚжӨӨ?function showLogin() {
  var container = document.getElementById('mainContainer');
  container.innerHTML =
    '<div class="login-card">' +
    '<div class="login-title">йҰғж”ј з» пј„жӮҠйҚӣжЁјж«ҘиӨ°?/div>' +
    '<div class="form-group">' +
    '<label class="form-label">з» пј„жӮҠйҚӣжЁҝеӨ„йҚҷ?/label>' +
    '<input class="form-input" id="adminAccount" placeholder="з’Үз–Ҝз·ӯйҚҸгғ§о…ёйҗһе——жҶіз’җп№ҖеҪҝ" value="admin">' +
    '</div>' +
    '<div class="form-group">' +
    '<label class="form-label">з» пј„жӮҠйҚӣжЁәзҳ‘йҗ®?/label>' +
    '<input class="form-input" id="adminPassword" type="password" placeholder="з’Үз–Ҝз·ӯйҚҸгғ§о…ёйҗһе——жҶізҖөе—ҷзҲң" value="admin123">' +
    '</div>' +
    '<button class="btn-admin" onclick="adminLogin()">йҗ§иҜІз¶Қ</button>' +
    '<div style="text-align:center;font-size:12px;color:#999;margin-top:12px;">жҰӣжЁҝо…»з’җп№ҖеҪҝй”ӣжӯӣdmin / admin123</div>' +
    '</div>';
}

function adminLogin() {
  var account = document.getElementById('adminAccount').value.trim();
  var password = document.getElementById('adminPassword').value.trim();

  if (!account || !password) {
    toast('з’Үз–Ҝз·ӯйҚҸгғЁеӨ„йҚҷеі°жӢ°зҖөе—ҷзҲң');
    return;
  }

  if (account !== ADMIN_ACCOUNT || password !== ADMIN_PASSWORD) {
    toast('з’җп№ҖеҪҝйҺҙж §зҳ‘йҗ®дҫҖж•Ҡз’Ү?);
    return;
  }

  isLoggedIn = true;
  sessionStorage.setItem('village_admin_logged', 'true');
  toast('йҗ§иҜІз¶ҚйҺҙж„¬е§ӣ');
  showAdminPanel();
}

function adminLogout() {
  if (!confirm('зәӯоҶјз•ҫз‘•дҫҖвӮ¬вӮ¬йҚ‘иҷ№ж«ҘиӨ°жӣһжӮ§й”ӣ?)) return;
  isLoggedIn = false;
  sessionStorage.removeItem('village_admin_logged');
  showLogin();
}

// йҸ„еү§гҒҡз» пј„жӮҠй—ҲгҲЎжҫҳ
function showAdminPanel() {
  var container = document.getElementById('mainContainer');
  container.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
    '<div style="font-size:16px;font-weight:bold;color:#333;">йҰғжҶў з» пј„жӮҠйҚӣж©ҖжҪ°йҸү?/div>' +
    '<button onclick="adminLogout()" style="padding:4px 12px;background:#F44336;color:white;border:none;border-radius:4px;font-size:12px;cursor:pointer;">й–«вӮ¬йҚ‘иҷ№ж«ҘиӨ°?/button>' +
    '</div>' +

    '<div class="tab-nav">' +
    '<div class="tab-nav-item active" id="tabVillages" onclick="switchTab(\'villages\')">йҰғеҪүй””?йҸүжҲқз°һйҚ’жҘ„гҖғ</div>' +
    '<div class="tab-nav-item" id="tabChiefApps" onclick="switchTab(\'chiefApps\')">йҰғжҮҒ йҸүжҲҰжҡұеЁүг„Ҙе”Ҫ</div>' +
    '</div>' +

    '<div id="panelVillages"></div>' +
    '<div id="panelChiefApps" class="hidden"></div>';

  loadVillageStats();
}

// TabйҚ’еӣЁеҙІ
function switchTab(tab) {
  var tabs = ['Villages', 'ChiefApps'];
  for (var ti = 0; ti < tabs.length; ti++) {
    var tabEl = document.getElementById('tab' + tabs[ti]);
    if (tabEl) tabEl.classList.remove('active');
  }
  var activeTab = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1, tab.length - (tab.endsWith('Apps') ? 4 : 0)) + (tab.endsWith('Apps') ? 'Apps' : ''));
  // з» вӮ¬йҚ–?  if (tab === 'villages') {
    document.getElementById('tabVillages').classList.add('active');
    document.getElementById('panelVillages').classList.remove('hidden');
    document.getElementById('panelChiefApps').classList.add('hidden');
    loadVillageStats();
  } else if (tab === 'chiefApps') {
    document.getElementById('tabChiefApps').classList.add('active');
    document.getElementById('panelVillages').classList.add('hidden');
    document.getElementById('panelChiefApps').classList.remove('hidden');
    loadChiefApplications();
  }
}

// ========== йҸүжҲқз°һзјҒзҶ»о…ё ==========

function loadVillageStats() {
  var panel = document.getElementById('panelVillages');
  var villages = Storage.get('villages', []);
  var products = Storage.get('products', []);
  var foods = Storage.get('foods', []);
  var camps = Storage.get('camps', []);

  // йҚҸг„Ҙзң¬зјҒзҶ»о…ё
  var totalProducts = products.length;
  var totalFoods = foods.length;
  var totalCamps = camps.length;

  panel.innerHTML =
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="stat-value">' + villages.length + '</div><div class="stat-label">йҸүжҲқз°һйҺ¬з»ҳжҡҹ</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalProducts + '</div><div class="stat-label">йҚҗж»ҖйӘҮйҚқдҪ№вӮ¬з»ҳжҡҹ</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalFoods + '</div><div class="stat-label">зјҮеәЁо—ӨйҺ¬з»ҳжҡҹ</div></div>' +
    '<div class="stat-card"><div class="stat-value">' + totalCamps + '</div><div class="stat-label">й—ҮиҢ¶жғҖйҺ¬з»ҳжҡҹ</div></div>' +
    '</div>' +

    '<div style="font-size:14px;font-weight:bold;color:#333;margin-bottom:12px;">йҰғеҪүй””?йҸүжҲқз°һйҚ’жҘ„гҖғ</div>';

  if (villages.length === 0) {
    panel.innerHTML += '<div class="empty-state"><span class="empty-icon">йҰғеҪүй””?/span><div>йҸҶеӮӣжЈӨйҸүжҲқз°һйҸҒзүҲеөҒ</div></div>';
    return;
  }

  for (var vi = 0; vi < villages.length; vi++) {
    var v = villages[vi];
    var pCount = 0, fCount = 0, cCount = 0;
    for (var pi = 0; pi < products.length; pi++) {
      if (products[pi].villageId === v.id) pCount++;
    }
    for (var fi = 0; fi < foods.length; fi++) {
      if (foods[fi].villageId === v.id) fCount++;
    }
    for (var ci = 0; ci < camps.length; ci++) {
      if (camps[ci].villageId === v.id) cCount++;
    }

    panel.innerHTML += '<div class="village-card">' +
      '<div class="village-card-header">' +
      '<span class="village-card-name">йҰғеҪүй””?' + v.name + '</span>' +
      '</div>' +
      '<div class="village-card-chief">йҰғж‘“ йҸүжҲҰжҡұй”ӣ? + (v.chief ? v.chief.name : 'йҸҶеӮӣжЈӨ') + (v.chief && v.chief.phone ? ' (' + v.chief.phone + ')' : '') + '</div>' +
      '<div class="village-card-chief">йҰғжҗ· ' + (v.province || '') + ' ' + (v.city || '') + ' | жөңе“„еҪӣй”ӣ? + (v.population || 'йҸҲоҒҶз…Ў') + '</div>' +
      '<div class="village-card-stats" style="margin-top:6px;">' +
      '<span>йҰғгӮ¬ йҚҗж»ҖйӘҮйҚқдҫҠзҙ°<span class="village-card-stat">' + pCount + '</span></span>' +
      '<span>йҰғеҙӘ зјҮеәЁо—Өй”ӣ?span class="village-card-stat">' + fCount + '</span></span>' +
      '<span>йүҖ?й—ҮиҢ¶жғҖй”ӣ?span class="village-card-stat">' + cCount + '</span></span>' +
      '</div>' +
      '</div>';
  }
}

// ========== йҸүжҲҰжҡұеЁүг„Ҙе”ҪзҖ№в„ғзүі ==========

function loadChiefApplications() {
  var panel = document.getElementById('panelChiefApps');

  // йҠҶж„Әж…Ёжҫ¶е¶ғвӮ¬жҲЈоҮ°йҚҷж Ёо„ңзәӯоҶҫж®‘ storage keyй”ӣжӯөownship_applicationsй”ӣе ңз¬Ңregister-township.htmlж¶“вӮ¬й‘·иҫҫзҙҡ
  var apps = Storage.get('township_applications', []);
  var pending = [];
  for (var i = 0; i < apps.length; i++) {
    // йҠҶж„Әж…Ёжҫ¶е¶ғвӮ¬жҲ е§ёйҺ¬дҪёвӮ¬з…Һе°®й–°е¶Ҹзҙ°'еҜ°е‘ӯо…ёйҸҚ?й”ӣе ңз¬үйҸ„?waiting'й”ӣ?    if (apps[i].status === 'еҜ°е‘ӯо…ёйҸҚ?) {
      pending.push(apps[i]);
    }
  }

  var approvedCount = 0;
  var rejectedCount = 0;
  for (var j = 0; j < apps.length; j++) {
    if (apps[j].status === 'е®ёжҹҘвӮ¬ж°із№ғ') approvedCount++;
    else if (apps[j].status === 'е®ёеҸүе«ҶзјҒ?) rejectedCount++;
  }

  panel.innerHTML =
    '<div class="stats-grid" style="margin-bottom:16px;">' +
    '<div class="stat-card"><div class="stat-value" style="color:#FF9800;">' + pending.length + '</div><div class="stat-label">еҜ°е‘ӯо…ёйҸҚ?/div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:#4CAF50;">' + approvedCount + '</div><div class="stat-label">е®ёжҹҘвӮ¬ж°із№ғ</div></div>' +
    '<div class="stat-card"><div class="stat-value" style="color:#F44336;">' + rejectedCount + '</div><div class="stat-label">е®ёеҸүе«ҶзјҒ?/div></div>' +
    '<div class="stat-card"><div class="stat-value">' + apps.length + '</div><div class="stat-label">йҗўе® оҮ¬йҺ¬з»ҳжҡҹ</div></div>' +
    '</div>' +
    '<div style="font-size:14px;font-weight:bold;color:#333;margin-bottom:12px;">йҰғжҮҒ йҸүжҲҰжҡұеЁүг„Ҙе”Ҫйҗўе® оҮ¬</div>';

  if (pending.length === 0) {
    panel.innerHTML += '<div class="empty-state"><span class="empty-icon">йҰғжҮҒ</span><div>йҸҶеӮӣжЈӨеҜ°е‘ӯо…ёйҸҚе“Ҙж®‘йҸүжҲҰжҡұеЁүг„Ҙе”Ҫйҗўе® оҮ¬</div></div>';
    return;
  }

  for (var pi = 0; pi < pending.length; pi++) {
    var app = pending[pi];
    // йҠҶж„Әж…Ёжҫ¶е¶ғвӮ¬жҲқз“§еЁҲеһ«ж§§зҒҸеӢ¶зҙ°app.name=йҸүжҲңеҜҢжө иҜІоқҳйҚҡе¶Ҹзҙқapp.village=йҸүжҲқз°һйҚҡе¶ҮРһ
    panel.innerHTML += '<div class="app-card">' +
      '<div class="app-card-name">йҰғжҮҒ ' + (app.name || 'йҸҲоҒҶз…Ў') + '</div>' +
      '<div class="app-card-info">йҸүжҲқз°һй”ӣ? + (app.village || 'йҸҲоҒҶз…Ў') + ' | йҺөе¬«жәҖйҚҷеҮӨзҙ°' + (app.phone || 'йҸҲоҒҶз…Ў') + '</div>' +
      '<div class="app-card-info">йҚҰжқҝе°Ҝй”ӣ? + (app.province || '') + ' ' + (app.city || '') + '</div>' +
      '<div class="app-card-actions">' +
      '<button class="btn-approve" onclick="approveChief(\'' + app.id + '\')">йүҒ?й–«ж°із№ғ</button>' +
      '<button class="btn-reject" onclick="rejectChief(\'' + app.id + '\')">йүӮ?йҺ·жҺ”зІ·</button>' +
      '</div>' +
      '</div>';
  }
}

// й–«ж°із№ғйҸүжҲҰжҡұеЁүг„Ҙе”Ҫйҗўе® оҮ¬
function approveChief(appId) {
  if (!confirm('зәӯоҶјз•ҫй–«ж°із№ғе§қгӮҶжҪҷй—ҖжҢҺж•һйҚҗеІҖж•өз’ҮеҮӨзҙөйҸүжҲқз°һж·Үв„ғдј…зҒҸе—ҡоқҰйҚҗж¬ҸеҸҶйҸүжҲқз°һйҚ’жҘ„гҖғйҠҶ?)) return;

  var apps = Storage.get('township_applications', []);
  var app = null;
  var appIdx = -1;
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) { app = apps[i]; appIdx = i; break; }
  }
  if (!app) { toast('йҗўе® оҮ¬ж¶“е¶…з“ЁйҚҰ?); return; }

  // йҸҮеӯҳжҹҠйҗўе® оҮ¬йҗҳиҲөвӮ¬?  apps[appIdx].status = 'е®ёжҹҘвӮ¬ж°із№ғ';
  apps[appIdx].updateTime = Date.now();
  Storage.set('township_applications', apps);

  // йҚҗж¬ҸеҸҶйҸүжҲқз°һйҚ’жҘ„гҖғ
  var villages = Storage.get('villages', []);
  villages.push({
    id: app.id,
    name: app.village || 'йҸҲоҒ„жҮЎйҚҡе¶ҶжҪҷжҗҙ?,
    province: app.province || '',
    city: app.city || '',
    population: '',
    totalArea: '',
    farmlandArea: '',
    description: '',
    chief: { name: app.name, phone: app.phone },
    images: [],
    createTime: Date.now()
  });
  Storage.set('villages', villages);

  toast('е®ёжҹҘвӮ¬ж°із№ғй”ӣеұҫжҪҷжҗҙеӢ«еҮЎеЁЈиҜІе§һйҚ’жқҝеһӘзҗӣ?);
  loadChiefApplications();
}

// йҺ·жҺ”зІ·йҸүжҲҰжҡұеЁүг„Ҙе”Ҫйҗўе® оҮ¬
function rejectChief(appId) {
  if (!confirm('зәӯоҶјз•ҫйҺ·жҺ”зІ·е§қгӮҮж•өз’ҮеҮӨзҙө')) return;

  var apps = Storage.get('township_applications', []);
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) {
      apps[i].status = 'е®ёеҸүе«ҶзјҒ?;
      apps[i].updateTime = Date.now();
      break;
    }
  }
  Storage.set('township_applications', apps);
  toast('е®ёеҸүе«ҶзјҒжҝҠоҮҡйҗўе® оҮ¬');
  loadChiefApplications();
}

// жӨӨз”ёжҪ°йҚ”зҠәжөҮзҖ№еұҫеһҡйҚҡеәЎеһөжҝ®е¬ӘеҜІ
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

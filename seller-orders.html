<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>еҚ–е®¶и®ўеҚ•з®ЎзҗҶ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#f5f5f5;color:#333;font-size:14px}
.header{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;padding:12px 16px;z-index:100;display:flex;align-items:center}
.header-back{font-size:20px;cursor:pointer;padding-right:12px}
.header-title{font-size:18px;font-weight:bold}
.container{padding:60px 16px 80px;max-width:750px;margin:0 auto}
.tab-box{display:flex;background:#fff;position:sticky;top:48px;z-index:50;border-bottom:1px solid #e0e0e0}
.tab-item{flex:1;text-align:center;padding:10px 0;font-size:14px;color:#666;cursor:pointer;position:relative}
.tab-item.active{color:#2E7D32;font-weight:600}
.tab-item.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:40px;height:3px;background:#2E7D32;border-radius:2px}
.order-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-id{font-size:12px;color:#999}
.order-status{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
.s0{background:#fff3e0;color:#FF9800}
.s1{background:#e8f5e9;color:#2E7D32}
.s2{background:#e3f2fd;color:#1976D2}
.s3{background:#f5f5f5;color:#999}
.s4{background:#fce4ec;color:#E91E63}
.order-info{font-size:13px;color:#666;line-height:1.6;margin-bottom:8px}
.order-actions{display:flex;gap:8px;margin-top:8px}
.btn-action{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #e0e0e0;background:#fff;color:#333}
.btn-action.primary{background:#2E7D32;color:#fff;border-color:#2E7D32}
.btn-detail{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid #2E7D32;background:#e8f5e9;color:#2E7D32}
.empty{text-align:center;padding:60px 0;color:#999}
.empty-icon{font-size:48px;margin-bottom:12px}
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px 16px 30px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:18px;font-weight:bold;margin-bottom:16px;text-align:center}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.modal-label{color:#666;font-size:13px}
.modal-val{font-size:14px;font-weight:500;max-width:60%;text-align:right;word-break:break-all}
.modal-val.phone{color:#2E7D32;cursor:pointer}
.modal-section{font-size:13px;color:#999;margin:12px 0 6px;font-weight:600}
.modal-close{width:100%;padding:12px;background:#f5f5f5;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:16px}
</style>
</head>
<body>
<div class="header">
  <span class="header-back" onclick="history.back()">вҶҗ</span>
  <span class="header-title">еҚ–е®¶и®ўеҚ•</span>
</div>
<div class="tab-box">
  <div class="tab-item active" onclick="switchTab(0,this)">еҫ…еҸ‘иҙ§</div>
  <div class="tab-item" onclick="switchTab(1,this)">е·ІеҸ‘иҙ§</div>
  <div class="tab-item" onclick="switchTab(2,this)">е·Іе®ҢжҲҗ</div>
  <div class="tab-item" onclick="switchTab(3,this)">е·ІеҸ–ж¶Ҳ</div>
</div>
<div class="container" id="list"></div>
<div id="modalRoot"></div>
<script src="app.js"></script>
<script>
var statusList=['еҫ…еҸ‘иҙ§','е·ІеҸ‘иҙ§','е·Іе®ҢжҲҗ','е·ІеҸ–ж¶Ҳ'];
var statusClass=['s0','s1','s2','s3'];
var currentTab=0;

function init(){
  var user=Storage.get('user',null);
  if(!user){alert('иҜ·е…Ҳзҷ»еҪ•');location.href='login.html';return;}
  loadOrders();
}

function switchTab(idx,el){
  currentTab=idx;
  var tabs=document.querySelectorAll('.tab-item');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  el.classList.add('active');
  loadOrders();
}

function loadOrders(){
  var user=Storage.get('user',null);
  var orders=Storage.get('orders',[]);
  var list=document.getElementById('list');
  list.innerHTML='';

  var myOrders=[];
  for(var i=0;i<orders.length;i++){
    if(orders[i].sellerId===user.account || orders[i].sellerId===user.id || orders[i].sellerId===(user.phone||'')){
      myOrders.push(orders[i]);
    }
  }

  var filtered=[];
  var targetStatus=statusList[currentTab];
  for(var j=0;j<myOrders.length;j++){
    if(myOrders[j].status===targetStatus)filtered.push(myOrders[j]);
  }

  if(filtered.length===0){
    list.innerHTML='<div class="empty"><div class="empty-icon">рҹ“Ұ</div><div>жҡӮж— '+targetStatus+'и®ўеҚ•</div></div>';
    return;
  }

  for(var k=0;k<filtered.length;k++){
    var o=filtered[k];
    var sc=statusClass[currentTab];
    var actions='';
    if(o.status==='еҫ…еҸ‘иҙ§'){
      actions='<button class="btn-action primary" onclick="shipOrder(\''+o.id+'\')">еҸ‘иҙ§</button>'+
              '<button class="btn-action" onclick="cancelOrder(\''+o.id+'\')">еҸ–ж¶Ҳ</button>';
    } else if(o.status==='е·ІеҸ‘иҙ§'){
      actions='<span style="font-size:12px;color:#2E7D32">зӯүеҫ…д№°е®¶зЎ®и®Өж”¶иҙ§</span>';
    }

    // еҚЎзүҮеҶ…д№ҹжҳҫзӨәд№°е®¶з”өиҜқпјҲеҰӮжһңжңүпјү
    var cardPhone = o.buyerPhone || o.phone || 'вҖ”';
    var cardAddr = o.buyerAddr || o.address || 'вҖ”';

    var card=document.createElement('div');
    card.className='order-card';
    card.innerHTML=
      '<div class="order-header">'+
        '<span class="order-id">и®ўеҚ•еҸ·пјҡ'+o.id+'</span>'+
        '<span class="order-status '+sc+'">'+o.status+'</span>'+
      '</div>'+
      '<div class="order-info">'+
        (o.productName||o.foodName||o.campName||'е•Ҷе“Ғ')+' Г— '+o.qty+' = ВҘ'+o.total+'<br>'+
        'д№°е®¶пјҡ'+(o.buyerName||o.buyerNick||o.name||'жңӘзҹҘ')+' &nbsp; вҳҺ'+cardPhone+'<br>'+
        'ең°еқҖпјҡ'+cardAddr+'<br>'+
        'дёӢеҚ•ж—¶й—ҙпјҡ'+new Date(o.createTime).toLocaleString()+
      '</div>'+
      '<div class="order-actions">'+
        '<button class="btn-detail" onclick="showDetail(\''+o.id+'\')">рҹ“Ӣ жҹҘзңӢиҜҰжғ…</button>'+
        actions+
      '</div>';
    list.appendChild(card);
  }
}

function showDetail(orderId){
  var orders=Storage.get('orders',[]);
  var o=null;
  for(var i=0;i<orders.length;i++){if(orders[i].id===orderId){o=orders[i];break;}}
  if(!o)return;

  // дјҳе…Ҳз”Ёи®ўеҚ•йҮҢзҡ„д№°е®¶дҝЎжҒҜпјҢжІЎжңүеҲҷжҳҫзӨә"жңӘеЎ«еҶҷ"
  var phone=o.buyerPhone||o.phone||'';
  var addr=o.buyerAddr||o.address||'';
  var name=o.buyerName||o.buyerNick||o.name||'';

  var phoneHtml='<span class="modal-val" style="color:#999">жңӘеЎ«еҶҷ</span>';
  if(phone){
    phoneHtml='<span class="modal-val phone" onclick="callPhone(\''+phone+'\')">'+phone+' рҹ“һ</span>';
  }
  var addrHtml='<span class="modal-val" style="color:#999">жңӘеЎ«еҶҷ</span>';
  if(addr){
    addrHtml='<span class="modal-val">'+addr+'</span>';
  }
  var nameHtml='<span class="modal-val" style="color:#999">жңӘеЎ«еҶҷ</span>';
  if(name){
    nameHtml='<span class="modal-val">'+name+'</span>';
  }

  var html='<div class="modal-mask" onclick="closeModal(event)">'+
    '<div class="modal-box" onclick="event.stopPropagation()">'+
      '<div class="modal-title">и®ўеҚ•иҜҰжғ…</div>'+
      '<div class="modal-section">рҹӣ’ е•Ҷе“ҒдҝЎжҒҜ</div>'+
      '<div class="modal-row"><span class="modal-label">е•Ҷе“ҒеҗҚз§°</span><span class="modal-val">'+(o.productName||o.foodName||o.campName||'е•Ҷе“Ғ')+'</span></div>'+
      '<div class="modal-row"><span class="modal-label\">ж•°йҮҸ</span><span class="modal-val">'+o.qty+'</span></div>'+
      '<div class="modal-row"><span class="modal-label">йҮ‘йўқ</span><span class="modal-val" style="color:#FF9800">ВҘ'+o.total+'</span></div>'+
      '<div class="modal-row"><span class="modal-label">и®ўеҚ•зҠ¶жҖҒ</span><span class="modal-val">'+o.status+'</span></div>'+
      (o.remark||o.note?'<div class="modal-row"><span class="modal-label">еӨҮжіЁ</span><span class="modal-val">'+(o.remark||o.note)+'</span></div>':'')+
      '<div class="modal-section">рҹ‘Ө д№°е®¶дҝЎжҒҜ</div>'+
      '<div class="modal-row"><span class="modal-label">е§“еҗҚ</span>'+nameHtml+'</div>'+
      '<div class="modal-row"><span class="modal-label">з”өиҜқ</span>'+phoneHtml+'</div>'+
      '<div class="modal-row"><span class="modal-label">ең°еқҖ</span>'+addrHtml+'</div>'+
      (o.pickupTime?'<div class="modal-row"><span class="modal-label">еҸ–йӨҗж—¶й—ҙ</span><span class="modal-val">'+o.pickupTime+'</span></div>':'')+
      (o.checkin?'<div class="modal-row"><span class="modal-label">е…ҘдҪҸж—Ҙжңҹ</span><span class="modal-val">'+o.checkin+'</span></div>':'')+
      '<div class="modal-section">рҹ“… и®ўеҚ•ж—¶й—ҙ</div>'+
      '<div class="modal-row"><span class="modal-label">дёӢеҚ•ж—¶й—ҙ</span><span class="modal-val">'+new Date(o.createTime).toLocaleString()+'</span></div>'+
      '<button class="modal-close" onclick="closeModal()">е…ій—ӯ</button>'+
    '</div></div>';

  document.getElementById('modalRoot').innerHTML=html;
}

function callPhone(phone){
  if(phone){
    location.href='tel:'+phone;
  }
}

function closeModal(e){
  if(e && e.target!==e.currentTarget)return;
  document.getElementById('modalRoot').innerHTML='';
}

function shipOrder(orderId){
  if(!confirm('зЎ®и®Өе·ІеҸ‘иҙ§пјҹ'))return;
  var orders=Storage.get('orders',[]);
  for(var i=0;i<orders.length;i++){
    if(orders[i].id===orderId){orders[i].status='е·ІеҸ‘иҙ§';break;}
  }
  Storage.set('orders',orders);
  toast('е·Іж Үи®°дёәе·ІеҸ‘иҙ§');
  loadOrders();
}

function cancelOrder(orderId){
  if(!confirm('зЎ®и®ӨеҸ–ж¶ҲжӯӨи®ўеҚ•пјҹ'))return;
  var orders=Storage.get('orders',[]);
  for(var i=0;i<orders.length;i++){
    if(orders[i].id===orderId){orders[i].status='е·ІеҸ–ж¶Ҳ';break;}
  }
  Storage.set('orders',orders);
  toast('и®ўеҚ•е·ІеҸ–ж¶Ҳ');
  loadOrders();
}

init();
</script>
</body>
</html>

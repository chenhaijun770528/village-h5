<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册审核</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background:#f5f5f5; color:#333; font-size:14px; }
    .header { position:fixed; top:0; left:0; right:0; background:linear-gradient(135deg, #2E7D32, #4CAF50); color:white; padding:12px 16px; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
    .header-title { font-size:16px; font-weight:600; }
    .header-btn { background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; }
    .container { padding:60px 12px 20px; max-width:600px; margin:0 auto; }
    .card { background:white; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size:15px; font-weight:600; margin-bottom:12px; color:#2E7D32; display:flex; align-items:center; gap:8px; }
    .field { margin-bottom:10px; }
    .field-label { font-size:12px; color:#999; margin-bottom:2px; }
    .field-value { font-size:14px; color:#333; word-break:break-all; }
    .btn { padding:10px 16px; border:none; border-radius:8px; font-size:14px; cursor:pointer; flex:1; font-weight:500; }
    .btn-approve { background:#4CAF50; color:white; }
    .btn-reject { background:#f44336; color:white; }
    .btn-group { display:flex; gap:8px; margin-top:16px; }
    .status { display:inline-block; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:500; }
    .status-pending { background:#FFF3E0; color:#E65100; }
    .status-approved { background:#E8F5E9; color:#2E7D32; }
    .status-rejected { background:#FFEBEE; color:#C62828; }
    .empty { text-align:center; padding:40px; color:#999; }
    .tabs { display:flex; gap:0; margin-bottom:12px; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .tab { flex:1; padding:10px; text-align:center; font-size:13px; cursor:pointer; border-bottom:3px solid transparent; }
    .tab.active { border-bottom-color:#2E7D32; color:#2E7D32; font-weight:600; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">📋 注册审核</div>
    <button class="header-btn" onclick="clearAll()">清空本地</button>
  </div>
  
  <div class="container" id="mainContainer">
    <div class="tabs">
      <div class="tab active" id="tabPending" onclick="switchTab('pending')">待审核</div>
      <div class="tab" id="tabApproved" onclick="switchTab('approved')">已通过</div>
      <div class="tab" id="tabRejected" onclick="switchTab('rejected')">已拒绝</div>
    </div>
    <div id="listContainer"></div>
  </div>
  
  <script src="storage.js"></script>
  <script>
    var currentTab = 'pending';
    var _regs = []; // 缓存注册数据，避免 id 匹配问题
    
    // 解析 URL 中的注册数据
    function parseUrlData() {
      var hash = location.hash.substring(1);
      if (!hash) return null;
      try {
        var json = decodeURIComponent(atob(hash));
        return JSON.parse(json);
      } catch(e) {
        return null;
      }
    }
    
    // 保存注册数据到 localStorage
    function saveRegistration(data) {
      var registrations = Storage.get('registrations', []);
      if (!Array.isArray(registrations)) registrations = [];
      
      data.id = data.id || ('reg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6));
      data.status = '待审核';
      data.createdAt = Date.now();
      
      registrations.unshift(data);
      Storage.set('registrations', registrations);
      
      return data;
    }
    
    // 切换 Tab
    function switchTab(tab) {
      currentTab = tab;
      ['pending', 'approved', 'rejected'].forEach(function(t) {
        var el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
        if (el) el.classList.toggle('active', t === tab);
      });
      renderList();
    }
    
    // 渲染列表 - 用 data-id 属性，不用 onclick 字符串拼接
    function renderList() {
      var container = document.getElementById('listContainer');
      _regs = Storage.get('registrations', []);
      
      if (!Array.isArray(_regs) || _regs.length === 0) {
        container.innerHTML = '<div class="empty">暂无注册申请</div>';
        return;
      }
      
      var filtered = _regs.filter(function(reg) {
        if (currentTab === 'pending') return reg.status === '待审核';
        if (currentTab === 'approved') return reg.status === '已通过';
        if (currentTab === 'rejected') return reg.status === '已拒绝';
        return true;
      });
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty">暂无' + (currentTab === 'pending' ? '待审核' : currentTab === 'approved' ? '已通过' : '已拒绝') + '的申请</div>';
        return;
      }
      
      var html = '';
      filtered.forEach(function(reg, idx) {
        var statusClass = '';
        var statusText = '';
        if (reg.status === '已通过') { statusClass = 'status-approved'; statusText = '✅ 已通过'; }
        else if (reg.status === '已拒绝') { statusClass = 'status-rejected'; statusText = '❌ 已拒绝'; }
        else { statusClass = 'status-pending'; statusText = '⏳ 待审核'; }
        
        html += '<div class="card" data-idx="' + idx + '">';
        html += '<div class="card-title">' + (reg.role || '未知角色') + ' <span class="status ' + statusClass + '">' + statusText + '</span></div>';
        
        var fields = ['name', 'phone', 'account', 'address', 'experience', 'skills', 'description', 'village'];
        fields.forEach(function(field) {
          if (reg[field]) {
            var label = field === 'name' ? '姓名' :
                         field === 'phone' ? '电话' :
                         field === 'account' ? '账号' :
                         field === 'address' ? '地址' :
                         field === 'experience' ? '经验' :
                         field === 'skills' ? '技能' :
                         field === 'description' ? '描述' :
                         field === 'village' ? '村庄' : field;
            html += '<div class="field"><div class="field-label">' + label + '</div><div class="field-value">' + reg[field] + '</div></div>';
          }
        });
        
        html += '<div class="field"><div class="field-label">提交时间</div><div class="field-value">' + new Date(reg.createdAt || Date.now()).toLocaleString() + '</div></div>';
        
        if (reg.status === '待审核') {
          html += '<div class="btn-group">';
          html += '<button class="btn btn-approve" data-action="approve" data-id="' + reg.id + '">✅ 通过</button>';
          html += '<button class="btn btn-reject" data-action="reject" data-id="' + reg.id + '">❌ 拒绝</button>';
          html += '</div>';
        }
        
        html += '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // 事件代理 - 按钮点击统一在这里处理
    document.getElementById('listContainer').addEventListener('click', function(e) {
      var btn = e.target.closest('button[data-action]');
      if (!btn) return;
      
      var action = btn.getAttribute('data-action');
      var id = btn.getAttribute('data-id');
      
      if (action === 'approve') {
        approveById(id);
      } else if (action === 'reject') {
        rejectById(id);
      }
    });
    
    // 按 id 审核通过
    function approveById(id) {
      var registrations = Storage.get('registrations', []);
      var found = false;
      
      for (var i = 0; i < registrations.length; i++) {
        if (registrations[i].id === id) {
          registrations[i].status = '已通过';
          registrations[i].approvedAt = Date.now();
          found = true;
          break;
        }
      }
      
      if (!found) { toast('未找到该申请'); return; }
      
      Storage.set('registrations', registrations);
      
      toast('✅ 审核通过');
      renderList();
    }
    
    // 按 id 审核拒绝
    function rejectById(id) {
      var reason = prompt('拒绝原因（可选）：');
      var registrations = Storage.get('registrations', []);
      
      for (var i = 0; i < registrations.length; i++) {
        if (registrations[i].id === id) {
          registrations[i].status = '已拒绝';
          registrations[i].rejectReason = reason || '不符合要求';
          registrations[i].rejectedAt = Date.now();
          break;
        }
      }
      
      Storage.set('registrations', registrations);
      
      toast('❌ 已拒绝');
      renderList();
    }
    
    // 清空本地数据
    function clearAll() {
      if (!confirm('确定清空所有本地注册数据？')) return;
      Storage.set('registrations', []);
      renderList();
      toast('已清空');
    }
    
    // 初始化
    function init() {
      var urlData = parseUrlData();
      if (urlData) {
        saveRegistration(urlData);
        history.replaceState(null, null, location.pathname);
      }
      
      renderList();
    }
    
    function toast(msg) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:white;padding:8px 16px;border-radius:8px;font-size:14px;z-index:9999;';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }
    
    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核流程诊断</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: monospace; background:#f5f5f5; padding:20px; font-size:13px; }
    .section { background:white; padding:16px; margin-bottom:16px; border-radius:8px; }
    h3 { margin-bottom:12px; color:#2E7D32; }
    .row { margin:6px 0; padding:6px; background:#f9f9f9; border-radius:4px; }
    .key { color:#1976D2; font-weight:bold; }
    .val { color:#333; }
    .err { color:#F44336; }
    .ok { color:#4CAF50; }
    button { padding:10px 16px; background:#2E7D32; color:white; border:none; border-radius:6px; margin:4px; cursor:pointer; }
    pre { background:#222; color:#0f0; padding:10px; border-radius:4px; overflow:auto; max-height:300px; font-size:11px; }
  </style>
</head>
<body>
  <h2>🔍 审核流程诊断工具</h2>
  <p>打开控制台（F12），点下方按钮查看诊断结果</p>
  
  <div class="section">
    <h3>1️⃣ 当前登录状态</h3>
    <div id="loginStatus"></div>
  </div>
  
  <div class="section">
    <h3>2️⃣ 数据检查</h3>
    <button onclick="checkData()">检查所有数据</button>
    <div id="dataCheck"></div>
  </div>
  
  <div class="section">
    <h3>3️⃣ 模拟村民提交申请</h3>
    <button onclick="simulateApply()">模拟提交农产品申请</button>
    <div id="simApply"></div>
  </div>
  
  <div class="section">
    <h3>4️⃣ 模拟村主任审核</h3>
    <button onclick="simulateAudit()">模拟村主任查看审核</button>
    <div id="simAudit"></div>
  </div>
  
  <div class="section">
    <h3>5️⃣ 修复工具</h3>
    <button onclick="fixVillageData()">修复村庄数据</button>
    <button onclick="fixApplications()">修复申请数据</button>
  </div>
  
  <pre id="log"></pre>
  
  <script>
    function log(msg) { console.log(msg); document.getElementById('log').innerHTML += msg + '\n'; }
    
    function checkLogin() {
      var user = localStorage.getItem('village_user') ? JSON.parse(localStorage.getItem('village_user')) : null;
      var st = document.getElementById('loginStatus');
      if (!user) {
        st.innerHTML = '<div class="err">❌ 未登录！请先登录</div>';
        return null;
      }
      st.innerHTML = '<div class="ok">✅ 已登录</div>' +
        '<div class="row"><span class="key">账号:</span> <span class="val">' + user.account + '</span></div>' +
        '<div class="row"><span class="key">角色:</span> <span class="val">' + (user.currentRole || user.type || '未知') + '</span></div>' +
        '<div class="row"><span class="key">村庄:</span> <span class="val">' + ((user.currentRole && user.currentRole.village) || user.village || '未绑定') + '</span></div>';
      return user;
    }
    
    function checkData() {
      var st = document.getElementById('dataCheck');
      var keys = ['village_user', 'village_villages', 'village_product_applications', 'village_food_applications', 'village_camp_applications', 'village_registrations'];
      var html = '';
      keys.forEach(function(key) {
        var data = localStorage.getItem(key);
        var len = data ? JSON.parse(data).length : 0;
        html += '<div class="row"><span class="key">' + key + ':</span> <span class="val">' + (data ? '✅ ' + len + ' 条' : '❌ 空') + '</span></div>';
      });
      st.innerHTML = html;
    }
    
    function simulateApply() {
      var user = checkLogin();
      if (!user) return;
      
      var villages = localStorage.getItem('village_villages') ? JSON.parse(localStorage.getItem('village_villages')) : [];
      log('📦  villages 数据: ' + JSON.stringify(villages.slice(0, 2)));
      
      // 模拟提交
      var app = {
        id: Date.now(),
        sellerId: user.account,
        sellerName: user.account,
        name: '测试苹果',
        price: 5.00,
        unit: '斤',
        stock: 100,
        desc: '测试',
        village: user.village || '测试村',
        status: '待审核',
        applyTime: new Date().toISOString()
      };
      
      var apps = localStorage.getItem('village_product_applications') ? JSON.parse(localStorage.getItem('village_product_applications')) : [];
      apps.push(app);
      localStorage.setItem('village_product_applications', JSON.stringify(apps));
      
      document.getElementById('simApply').innerHTML = '<div class="ok">✅ 模拟申请已提交！共 ' + apps.length + ' 条申请</div>';
      log('提交申请: ' + JSON.stringify(app));
    }
    
    function simulateAudit() {
      var user = checkLogin();
      if (!user) return;
      
      var role = user.currentRole || { type: user.type, village: user.village };
      if (role.type !== 'head') {
        document.getElementById('simAudit').innerHTML = '<div class="err">❌ 当前角色不是村主任！type=' + role.type + '</div>';
        return;
      }
      
      var myVillage = role.village;
      log('村主任村庄: ' + myVillage);
      
      var apps = localStorage.getItem('village_product_applications') ? JSON.parse(localStorage.getItem('village_product_applications')) : [];
      log('全部申请: ' + apps.length + ' 条');
      
      var myApps = apps.filter(function(a) { return a.village === myVillage; });
      log('本村申请: ' + myApps.length + ' 条');
      
      document.getElementById('simAudit').innerHTML = 
        '<div class="row"><span class="key">村主任村庄:</span> <span class="val">' + myVillage + '</span></div>' +
        '<div class="row"><span class="key">全部申请:</span> <span class="val">' + apps.length + ' 条</span></div>' +
        '<div class="row"><span class="key">本村申请:</span> <span class="val">' + myApps.length + ' 条</span></div>' +
        (myApps.length === 0 ? '<div class="err">❌ 没有本村申请！检查村庄名称是否匹配</div>' : '<div class="ok">✅ 有 ' + myApps.length + ' 条本村申请</div>');
    }
    
    function fixVillageData() {
      var villages = [
        { id: 1, name: '幸福村', chief: { name: '张三' }, desc: '示例村庄' },
        { id: 2, name: '阳光村', chief: { name: '李四' }, desc: '示例村庄' }
      ];
      localStorage.setItem('village_villages', JSON.stringify(villages));
      log('✅ 村庄数据已修复: ' + villages.length + ' 条');
    }
    
    function fixApplications() {
      var apps = [
        { id: 1, sellerId: 'test', name: '测试产品', price: 5, unit: '斤', stock: 100, village: '幸福村', status: '待审核', applyTime: new Date().toISOString() }
      ];
      localStorage.setItem('village_product_applications', JSON.stringify(apps));
      log('✅ 申请数据已修复: ' + apps.length + ' 条');
    }
    
    // 自动检查
    checkLogin();
    checkData();
  </script>
</body>
</html>

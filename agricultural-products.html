<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农产品展示</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 60px 16px 80px; }
    .header { position: fixed; top: 0; left: 0; right: 0; background: #2E7D32; color: white; padding: 12px 16px; z-index: 100; display: flex; justify-content: space-between; }
    .goods-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .goods-card { background: white; border-radius: 8px; overflow: hidden; }
    .goods-img { width: 100%; height: 120px; object-fit: cover; }
    .goods-info { padding: 8px; }
    .goods-name { font-size: 14px; margin-bottom: 4px; }
    .goods-price { color: #FF9800; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <span onclick="history.back()">←</span>
    <span>🥬 农产品</span>
    <span></span>
  </div>

  <div id="productGrid"></div>

  <script>
    // 最简单的版本 - 只显示产品列表
    var products = [
      { id: 'p1', name: '有机大米', price: '68', unit: '袋/10斤', img: '' },
      { id: 'p2', name: '土鸡蛋', price: '45', unit: '盒/30枚', img: '' }
    ];

    function loadProducts() {
      var grid = document.getElementById('productGrid');
      var html = '<div class="goods-grid">';
      
      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        html += '<div class="goods-card">';
        
        if (p.img && p.img.length > 100) {
          html += '<img class="goods-img" src="' + p.img + '">';
        } else {
          html += '<div style="height:120px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:48px;">🥬</div>';
        }
        
        html += '<div class="goods-info">';
        html += '<div class="goods-name">' + p.name + '</div>';
        html += '<div class="goods-price">¥' + p.price + '/' + p.unit + '</div>';
        html += '</div></div>';
      }
      
      html += '</div>';
      grid.innerHTML = html;
    }

    loadProducts();
  </script>
</body>
</html>

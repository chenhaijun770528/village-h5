<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农产品展示</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background:#f5f5f5; color:#333; font-size:14px; line-height:1.5; }
    .header { position:fixed; top:0; left:0; right:0; background:linear-gradient(135deg,#2E7D32,#4CAF50); color:white; padding:12px 16px; z-index:100; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
    .header-title { font-size:18px; font-weight:bold; }
    .header-back { font-size:20px; cursor:pointer; padding:4px 8px; }
    .container { padding:60px 16px 80px; max-width:750px; margin:0 auto; }
    .goods-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .goods-card { background:white; border-radius:8px; overflow:hidden; }
    .goods-img { width:100%; height:120px; object-fit:cover; }
    .goods-info { padding:8px; }
    .goods-name { font-size:13px; color:#333; margin-bottom:4px; }
    .goods-price { font-size:16px; color:#FF9800; font-weight:bold; }
    .goods-btn { background:#2E7D32; color:white; border:none; width:100%; padding:6px; border-radius:4px; font-size:12px; cursor:pointer; margin-top:6px; }
    .tab-bar { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; justify-content:space-around; padding:8px 0; box-shadow:0 -2px 8px rgba(0,0,0,0.08); z-index:100; }
    .tab-item { text-align:center; cursor:pointer; padding:4px 0; }
    .tab-icon { font-size:24px; display:block; }
    .tab-text { font-size:11px; color:#999; margin-top:2px; }
    .tab-item.active .tab-text { color:#2E7D32; }
    .fab { position:fixed; right:20px; bottom:90px; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#2E7D32,#4CAF50); color:white; display:none; align-items:center; justify-content:center; font-size:28px; box-shadow:0 4px 12px rgba(46,125,50,0.4); cursor:pointer; z-index:200; }
    .modal-mask { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:flex-end; }
    .modal-mask.show { display:flex; }
    .modal-panel { background:white; width:100%; max-height:85vh; border-radius:16px 16px 0 0; padding:20px 16px; overflow-y:auto; animation:slideUp 0.3s; }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-panel h3 { text-align:center; font-size:16px; color:#333; margin-bottom:16px; }
    .modal-close { text-align:center; color:#999; padding:10px; cursor:pointer; font-size:14px; }
    .form-group { margin-bottom:16px; }
    .form-label { font-size:14px; color:#666; margin-bottom:6px; display:block; }
    .form-input { width:100%; padding:10px 12px; border:1px solid #e0e0e0; border-radius:8px; font-size:14px; outline:none; transition:border-color 0.2s; }
    .form-input:focus { border-color:#2E7D32; }
    .btn-primary { width:100%; padding:12px; background:#2E7D32; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
    .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.75); color:white; padding:12px 24px; border-radius:8px; font-size:14px; z-index:9999; animation:fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity:0; transform:translate(-50%,-50%) scale(0.8); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
    .empty-state { text-align:center; padding:60px 20px; color:#999; }
    .empty-icon { font-size:48px; display:block; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">🥬 农产品</span>
    <span style="width:40px"></span>
  </div>

  <div class="container">
    <div class="section-title" style="margin-bottom:12px;font-size:16px;font-weight:bold;color:#333;">🌾 精选农产品</div>
    <div class="goods-grid" id="productGrid"></div>
  </div>

  <div class="tab-bar">
    <div class="tab-item" onclick="goPage('index.html')"><span class="tab-icon">🏠</span><span class="tab-text">首页</span></div>
    <div class="tab-item" onclick="goPage('register.html')"><span class="tab-icon">📝</span><span class="tab-text">注册</span></div>
    <div class="tab-item" onclick="goPage('profile.html')"><span class="tab-icon">👤</span><span class="tab-text">我的</span></div>
  </div>

  <!-- 申请上架悬浮按钮 -->
  <div class="fab" id="fabBtn" onclick="openApplyModal()">+</div>

  <!-- 申请上架弹窗 -->
  <div class="modal-mask" id="applyModal">
    <div class="modal-panel">
      <h3 id="applyModalTitle">申请上架农产品</h3>
      <div class="form-group">
        <label class="form-label">农产品名称 *</label>
        <input class="form-input" id="applyName" placeholder="请输入农产品名称">
      </div>
      <div class="form-group">
        <label class="form-label">价格 *</label>
        <input class="form-input" id="applyPrice" type="number" placeholder="请输入价格">
      </div>
      <div class="form-group">
        <label class="form-label">单位 *</label>
        <input class="form-input" id="applyUnit" placeholder="如:斤、袋、箱">
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea class="form-input" id="applyDesc" rows="3" placeholder="请输入农产品描述"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">图片</label>
        <input type="file" id="applyImgInput" accept="image/*" onchange="previewApplyImg(event)" style="font-size:13px;">
        <img class="img-preview" id="applyImgPreview">
      </div>
      <div class="form-group">
        <label class="form-label">所属村庄 *</label>
        <select class="form-input" id="applyVillage"></select>
      </div>
      <input type="hidden" id="applyEditId" value="">
      <button class="btn-primary" onclick="submitApplication()">提交申请</button>
      <div class="modal-close" onclick="closeApplyModal()">取消</div>
    </div>
  </div>

  <script>
    // 数据存储
    var Storage = {
      get: function(key, defaultVal) {
        try {
          var v = localStorage.getItem('village_' + key);
          return v ? JSON.parse(v) : defaultVal;
        } catch(e) { return defaultVal; }
      },
      set: function(key, val) {
        localStorage.setItem('village_' + key, JSON.stringify(val));
      }
    };

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function toast(msg) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    function goPage(url) {
      window.location.href = url;
    }

    function compressImage(file, maxWidth, maxHeight, quality, callback) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var ctx = canvas.getContext('2d');
          var width = img.width;
          var height = img.height;
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          if (height > maxHeight) {
            width = (width * maxHeight) / height;
            height = maxHeight;
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    var currentApplyImgBase64 = '';

    function previewApplyImg(event) {
      var file = event.target.files[0];
      if (!file) return;
      compressImage(file, 800, 600, 0.7, function(dataUrl) {
        currentApplyImgBase64 = dataUrl;
        var preview = document.getElementById('applyImgPreview');
        preview.src = dataUrl;
        preview.style.display = 'block';
      });
    }

    function submitApplication() {
      var user = Storage.get('user', null);
      if (!user) { toast('请先登录'); return; }

      var name = document.getElementById('applyName').value.trim();
      var price = document.getElementById('applyPrice').value.trim();
      var unit = document.getElementById('applyUnit').value.trim();
      var desc = document.getElementById('applyDesc').value.trim();
      var villageId = document.getElementById('applyVillage').value;

      if (!name || !price || !unit || !villageId) {
        toast('请填写完整信息');
        return;
      }

      var villages = Storage.get('villages', []);
      var villageName = '';
      for (var vi = 0; vi < villages.length; vi++) {
        if (villages[vi].id === villageId) { villageName = villages[vi].name; break; }
      }

      var apps = Storage.get('product_applications', []);

      var newApp = {
        id: genId(),
        userId: user.id,
        userName: user.nickName,
        name: name,
        price: price,
        unit: unit,
        desc: desc,
        villageId: villageId,
        village: villageName,
        img: currentApplyImgBase64 || '',
        status: 'waiting',
        createTime: Date.now(),
        updateTime: Date.now()
      };
      apps.push(newApp);
      toast('申请提交成功');

      Storage.set('product_applications', apps);
      closeApplyModal();
    }

    function openApplyModal() {
      var user = Storage.get('user', null);
      if (!user) { toast('请先登录'); return; }

      document.getElementById('applyName').value = '';
      document.getElementById('applyPrice').value = '';
      document.getElementById('applyUnit').value = '';
      document.getElementById('applyDesc').value = '';
      document.getElementById('applyImgPreview').style.display = 'none';
      currentApplyImgBase64 = '';

      var villages = Storage.get('villages', []);
      var select = document.getElementById('applyVillage');
      select.innerHTML = '';
      for (var vi = 0; vi < villages.length; vi++) {
        var opt = document.createElement('option');
        opt.value = villages[vi].id;
        opt.textContent = villages[vi].name;
        select.appendChild(opt);
      }

      document.getElementById('applyModal').classList.add('show');
    }

    function closeApplyModal() {
      document.getElementById('applyModal').classList.remove('show');
    }

    function updateFabVisibility() {
      var user = Storage.get('user', null);
      if (!user) {
        document.getElementById('fabBtn').style.display = 'none';
        return;
      }
      document.getElementById('fabBtn').style.display = 'flex';
    }

    function initSampleData() {
      if (!Storage.get('villages', null)) {
        var defaultVillages = [
          {
            id: 'v1',
            name: '幸福村',
            province: '江苏省',
            city: '苏州市',
            chief: { name: '张建国', phone: '13800138001' }
          },
          {
            id: 'v2',
            name: '阳光村',
            province: '广东省',
            city: '广州市',
            chief: { name: '李明华', phone: '13800138002' }
          }
        ];
        Storage.set('villages', defaultVillages);
      }
      if (!Storage.get('products', null)) {
        Storage.set('products', [
          { id: 'p1', name: '有机大米', price: '68', unit: '袋/10斤', desc: '绿色有机种植,口感香糯', sales: 328, village: '幸福村', villageId: 'v1', img: '', sellerId: '', sellerName: '' },
          { id: 'p2', name: '土鸡蛋', price: '45', unit: '盒/30枚', desc: '散养土鸡,蛋黄饱满', sales: 256, village: '幸福村', villageId: 'v1', img: '', sellerId: '', sellerName: '' },
          { id: 'p3', name: '新鲜蜂蜜', price: '88', unit: '瓶/500g', desc: '深山百花蜜,纯天然', sales: 189, village: '阳光村', villageId: 'v2', img: '', sellerId: '', sellerName: '' }
        ]);
      }
      if (!Storage.get('product_applications', null)) {
        Storage.set('product_applications', []);
      }
    }

    function loadProducts() {
      var grid = document.getElementById('productGrid');
      var products = Storage.get('products', []);
      var user = Storage.get('user', null);

      grid.innerHTML = '';

      if (products.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><span class="empty-icon">🥬</span><div>暂无农产品</div></div>';
        return;
      }

      for (var i = 0; i < products.length; i++) {
        var p = products[i];
        var card = document.createElement('div');
        card.className = 'goods-card';

        var imgHtml = '';
        if (p.img && p.img.length > 100) {
          imgHtml = '<img src="' + p.img + '" style="width:100%;height:120px;object-fit:cover;" onerror="this.style.display=\'none\';">';
        } else {
          imgHtml = '<div style="width:100%;height:120px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;font-size:48px;">🥬</div>';
        }

        card.innerHTML = '<div class="goods-img">' + imgHtml + '</div>' +
          '<div class="goods-info">' +
          '<div class="goods-name">' + p.name + '</div>' +
          '<div class="goods-price">¥' + p.price + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + p.unit + '</span></div>' +
          '<button class="goods-btn" onclick="location.href=\'product-order.html?id=' + p.id + '\'">购买</button>' +
          '</div>';

        grid.appendChild(card);
      }
    }

    function init() {
      initSampleData();
      loadProducts();
      updateFabVisibility();
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农产品展示</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 60px 16px; }
    .header { position: fixed; top: 0; left: 0; right: 0; background: #2E7D32; color: white; padding: 12px 16px; z-index: 100; display: flex; justify-content: space-between; }
    .goods-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
    .goods-card { background: white; border-radius: 8px; overflow: hidden; }
    .goods-img { width: 100%; height: 120px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    .goods-info { padding: 8px; }
    .goods-name { font-size: 14px; margin-bottom: 4px; }
    .goods-price { color: #FF9800; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <span onclick="history.back()">←</span>
    <span>🥬 农产品</span>
    <span></span>
  </div>

  <div class="goods-grid">
    <div class="goods-card">
      <div class="goods-img">🥬</div>
      <div class="goods-info">
        <div class="goods-name">有机大米</div>
        <div class="goods-price">¥68/袋</div>
      </div>
    </div>
    <div class="goods-card">
      <div class="goods-img">🥚</div>
      <div class="goods-info">
        <div class="goods-name">土鸡蛋</div>
        <div class="goods-price">¥45/盒</div>
      </div>
    </div>
  </div>

  <!-- 无JavaScript，纯静态页面 -->
</body>
</html>

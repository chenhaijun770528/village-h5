<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乡村露营</title>
  <style>/* village-h5 全局样式 */
/* 主题色：绿色乡土风格 #2E7D32 */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background-color: #f5f5f5;
  color: #333;
  font-size: 14px;
  line-height: 1.5;
}

/* 顶部导航 */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  padding: 12px 16px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-title { font-size: 18px; font-weight: bold; }
.header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* 主容器 */
.container {
  padding: 60px 16px 80px;
  max-width: 750px;
  margin: 0 auto;
}

/* 露营卡片 */
.camp-list { display: flex; flex-direction: column; gap: 12px; }
.camp-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.camp-img { width: 100%; height: 180px; object-fit: cover; }
.camp-info { padding: 12px; }
.camp-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.camp-desc { font-size: 12px; color: #666; margin-bottom: 8px; }
.camp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.camp-tag { background: #f0f7f0; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.camp-price { font-size: 18px; color: #FF9800; font-weight: bold; margin-top: 8px; }

/* 底部导航 */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  z-index: 100;
}

.tab-item {
  text-align: center;
  cursor: pointer;
  padding: 4px 0;
}

.tab-icon { font-size: 24px; display: block; }
.tab-text { font-size: 11px; color: #999; margin-top: 2px; }
.tab-item.active .tab-text { color: #2E7D32; }

/* 悬浮按钮 */
.fab {
  position: fixed;
  right: 20px;
  bottom: 90px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 12px rgba(46,125,50,0.4);
  cursor: pointer;
  z-index: 200;
}

.fab:active { transform: scale(0.9); }

/* 我的申请按钮 */
.my-app-btn {
  position: fixed;
  right: 20px;
  bottom: 154px;
  background: white;
  color: #2E7D32;
  border: 1px solid #2E7D32;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  display: none;
  cursor: pointer;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.my-app-btn:active { background: #f0f7f0; }

/* 弹窗遮罩 */
.modal-mask {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: flex-end;
}

.modal-mask.show { display: flex; }

/* 弹窗面板 */
.modal-panel {
  background: white;
  width: 100%;
  max-height: 85vh;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px;
  overflow-y: auto;
  animation: slideUp 0.3s;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-panel h3 {
  text-align: center;
  font-size: 16px;
  color: #333;
  margin-bottom: 16px;
}

.modal-close {
  text-align: center;
  color: #999;
  padding: 10px;
  cursor: pointer;
  font-size: 14px;
}

/* 表单样式 */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: #2E7D32; }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: #2E7D32;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-primary:active { background: #1B5E20; }

/* 申请卡片 */
.app-card {
  background: white;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #FF9800;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.app-card.status-pass { border-left-color: #4CAF50; }
.app-card.status-reject { border-left-color: #F44336; }

.app-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.app-card-name { font-size: 14px; font-weight: bold; color: #333; }
.app-card-status { font-size: 12px; }
.app-card-status.waiting { color: #FF9800; }
.app-card-status.pass { color: #4CAF50; }
.app-card-status.reject { color: #F44336; }

.app-card-info { font-size: 12px; color: #999; margin-bottom: 8px; }
.app-card-actions { display: flex; gap: 8px; }
.app-card-actions button {
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #e0e0e0;
  background: white;
}

.app-card-actions .btn-edit { color: #2E7D32; border-color: #2E7D32; }
.app-card-actions .btn-delete { color: #F44336; border-color: #F44336; }

/* 图片预览 */
.img-preview {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  margin-top: 8px;
  display: none;
}

/* Toast提示 */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">⛺ 乡村露营</span>
    <span style="width:40px"></span>
  </div>

  <div class="container">
    <div class="section-title" style="margin-bottom:12px;font-size:16px;font-weight:bold;color:#333;">🏕️ 露营基地</div>
    <div class="camp-list" id="campList"></div>
  </div>

  <div class="tab-bar">
    <div class="tab-item" onclick="goPage('index.html')"><span class="tab-icon">🏠</span><span class="tab-text">首页</span></div>
    <div class="tab-item" onclick="goPage('register.html')"><span class="tab-icon">📝</span><span class="tab-text">注册</span></div>
    <div class="tab-item" onclick="goPage('profile.html')"><span class="tab-icon">👤</span><span class="tab-text">我的</span></div>
  </div>

  <!-- 我的申请按钮 -->
  <div class="my-app-btn" id="myAppBtn" onclick="openMyApplications()">我的申请</div>
  <!-- 申请上架悬浮按钮 -->
  <div class="fab" id="fabBtn" onclick="openApplyModal()">＋</div>

  <!-- 申请上架弹窗 -->
  <div class="modal-mask" id="applyModal">
    <div class="modal-panel">
      <h3 id="applyModalTitle">申请上架露营基地</h3>
      <div class="form-group">
        <label class="form-label">露营基地名称 *</label>
        <input class="form-input" id="applyName" placeholder="请输入名称">
      </div>
      <div class="form-group">
        <label class="form-label">价格 *</label>
        <input class="form-input" id="applyPrice" type="number" placeholder="请输入价格">
      </div>
      <div class="form-group">
        <label class="form-label">单位 *</label>
        <input class="form-input" id="applyUnit" placeholder="如：顶/晚、间/晚">
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea class="form-input" id="applyDesc" rows="3" placeholder="请输入描述"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">标签（用逗号分隔）</label>
        <input class="form-input" id="applyTags" placeholder="如：观星,烧烤,篝火">
      </div>
      <div class="form-group">
        <label class="form-label">图片</label>
        <input type="file" id="applyImgInput" accept="image/*" onchange="previewApplyImg(event)" style="font-size:13px">
        <img class="img-preview" id="applyImgPreview">
      </div>
      <div class="form-group">
        <label class="form-label">所属村庄 *</label>
        <select class="form-input" id="applyVillage"></select>
      </div>
      <input type="hidden" id="applyEditId" value="">
      <button class="btn-primary" onclick="submitApplication()">提交申请</button>
      <div class="modal-close" onclick="closeApplyModal()">取消</div>
    </div>
  </div>

  <!-- 我的申请弹窗 -->
  <div class="modal-mask" id="myAppModal">
    <div class="modal-panel">
      <h3>我的申请</h3>
      <div id="myAppList"></div>
      <div class="modal-close" onclick="closeMyAppModal()">关闭</div>
    </div>
  </div>

  <script>// village-h5 数据存储
var Storage = {
  get: function(key, defaultVal) {
    try {
      var v = localStorage.getItem('village_' + key);
      return v ? JSON.parse(v) : defaultVal;
    } catch(e) { return defaultVal; }
  },
  set: function(key, val) {
    localStorage.setItem('village_' + key, JSON.stringify(val));
  }
};

// 工具函数
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function toast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, duration);
}

function goPage(url) {
  window.location.href = url;
}

// 初始化示例数据
function initSampleData() {
  // 初始化村庄数据
  if (!Storage.get('villages', null)) {
    var defaultVillages = [
      {
        id: 'v1',
        name: '幸福村',
        province: '江苏省',
        city: '苏州市',
        population: '3280',
        totalArea: '4500',
        farmlandArea: '2800',
        commercialArea: '200',
        description: '幸福村位于苏州市郊区，环境优美，基础设施完善，是著名的生态农业示范村。',
        chief: { name: '张建国', phone: '13800138001' },
        images: []
      },
      {
        id: 'v2',
        name: '阳光村',
        province: '广东省',
        city: '广州市',
        population: '4560',
        totalArea: '6200',
        farmlandArea: '3500',
        commercialArea: '350',
        description: '阳光村是广州市郊的现代化农村，积极发展乡村旅游和生态农业。',
        chief: { name: '李明华', phone: '13800138002' },
        images: []
      }
    ];
    Storage.set('villages', defaultVillages);
  }
  
  // 初始化露营申请数据
  if (!Storage.get('camp_applications', null)) {
    Storage.set('camp_applications', []);
  }
}

// 页面初始化
function init() {
  initSampleData();
  loadCamps();
  updateFabVisibility();
}

// 加载露营列表
function loadCamps() {
  var list = document.getElementById('campList');
  var camps = [
    { id: 'c1', name: '星空露营基地', desc: '海拔800米，远离光污染，是观星圣地', price: '188', unit: '顶/晚', tags: ['观星', '烧烤', '篝火'] },
    { id: 'c2', name: '湖畔露营区', desc: '紧邻水库，湖光山色，宁静惬意', price: '158', unit: '顶/晚', tags: ['钓鱼', '划船', '亲子'] },
    { id: 'c3', name: '森林木屋营地', desc: '独栋木屋掩映在松林间，呼吸森林负氧离子', price: '288', unit: '间/晚', tags: ['森林', '静修', '养生'] }
  ];
  
  list.innerHTML = '';
  camps.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'camp-card';
    var tagsHtml = c.tags.map(function(tag) {
      return '<span class="camp-tag">' + tag + '</span>';
    }).join('');
    
    card.innerHTML = '<div class="camp-img" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:64px;">⛺</div>' +
      '<div class="camp-info">' +
      '<div class="camp-name">' + c.name + '</div>' +
      '<div class="camp-desc">' + c.desc + '</div>' +
      '<div class="camp-tags">' + tagsHtml + '</div>' +
      '<div class="camp-price">¥' + c.price + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + c.unit + '</span></div>' +
      '</div>';
    list.appendChild(card);
  });
}

// 检查登录和权限
function checkLoginAndVillager() {
  var user = Storage.get('user', null);
  if (!user) {
    toast('请先登录');
    return null;
  }
  var role = user.role || '';
  if (role !== '村民' && role !== '村主任') {
    toast('仅村民可申请上架');
    return null;
  }
  return user;
}

// 更新FAB按钮可见性
function updateFabVisibility() {
  var user = Storage.get('user', null);
  if (!user) {
    document.getElementById('fabBtn').style.display = 'none';
    document.getElementById('myAppBtn').style.display = 'none';
    return;
  }
  var role = user.role || '';
  if (role === '村民' || role === '村主任') {
    document.getElementById('fabBtn').style.display = 'flex';
    document.getElementById('myAppBtn').style.display = 'block';
  } else {
    document.getElementById('fabBtn').style.display = 'none';
    document.getElementById('myAppBtn').style.display = 'none';
  }
}

// 打开申请弹窗
var currentApplyImgBase64 = '';

function openApplyModal(appId) {
  var user = checkLoginAndVillager();
  if (!user) return;
  
  // 重置表单
  document.getElementById('applyName').value = '';
  document.getElementById('applyPrice').value = '';
  document.getElementById('applyUnit').value = '';
  document.getElementById('applyDesc').value = '';
  document.getElementById('applyTags').value = '';
  document.getElementById('applyImgInput').value = '';
  document.getElementById('applyImgPreview').style.display = 'none';
  document.getElementById('applyEditId').value = '';
  currentApplyImgBase64 = '';
  document.getElementById('applyModalTitle').textContent = '申请上架露营基地';
  
  // 加载村庄列表
  var villageSelect = document.getElementById('applyVillage');
  var villages = Storage.get('villages', []);
  villageSelect.innerHTML = villages.map(function(v) {
    return '<option value="' + v.id + '">' + v.name + '</option>';
  }).join('');
  
  // 如果是编辑模式
  if (appId) {
    document.getElementById('applyModalTitle').textContent = '编辑露营基地申请';
    document.getElementById('applyEditId').value = appId;
    
    var apps = Storage.get('camp_applications', []);
    var app = null;
    for (var i = 0; i < apps.length; i++) {
      if (apps[i].id === appId) { app = apps[i]; break; }
    }
    
    if (app) {
      document.getElementById('applyName').value = app.name;
      document.getElementById('applyPrice').value = app.price;
      document.getElementById('applyUnit').value = app.unit;
      document.getElementById('applyDesc').value = app.desc || '';
      document.getElementById('applyTags').value = (app.tags || []).join(',');
      document.getElementById('applyVillage').value = app.village;
      
      if (app.img) {
        currentApplyImgBase64 = app.img;
        var preview = document.getElementById('applyImgPreview');
        preview.src = app.img;
        preview.style.display = 'block';
      }
    }
  }
  
  document.getElementById('applyModal').classList.add('show');
}

// 关闭申请弹窗
function closeApplyModal() {
  document.getElementById('applyModal').classList.remove('show');
}

// 预览申请图片
function previewApplyImg(event) {
  var file = event.target.files[0];
  if (!file) return;
  
  var reader = new FileReader();
  reader.onload = function(e) {
    currentApplyImgBase64 = e.target.result;
    var preview = document.getElementById('applyImgPreview');
    preview.src = e.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

// 提交申请
function submitApplication() {
  var user = checkLoginAndVillager();
  if (!user) return;
  
  var name = document.getElementById('applyName').value.trim();
  var price = document.getElementById('applyPrice').value.trim();
  var unit = document.getElementById('applyUnit').value.trim();
  var desc = document.getElementById('applyDesc').value.trim();
  var tags = document.getElementById('applyTags').value.trim();
  var village = document.getElementById('applyVillage').value;
  var editId = document.getElementById('applyEditId').value;
  
  if (!name || !price || !unit || !village) {
    toast('请填写完整信息');
    return;
  }
  
  var apps = Storage.get('camp_applications', []);
  
  if (editId) {
    // 编辑模式
    for (var i = 0; i < apps.length; i++) {
      if (apps[i].id === editId) {
        apps[i].name = name;
        apps[i].price = price;
        apps[i].unit = unit;
        apps[i].desc = desc;
        apps[i].tags = tags ? tags.split(',') : [];
        apps[i].village = village;
        apps[i].img = currentApplyImgBase64 || apps[i].img;
        apps[i].updateTime = Date.now();
        break;
      }
    }
    toast('申请修改成功');
  } else {
    // 新增模式
    var newApp = {
      id: genId(),
      userId: user.id,
      userName: user.nickName,
      name: name,
      price: price,
      unit: unit,
      desc: desc,
      tags: tags ? tags.split(',') : [],
      village: village,
      img: currentApplyImgBase64,
      status: 'waiting', // waiting/pass/reject
      createTime: Date.now(),
      updateTime: Date.now()
    };
    apps.push(newApp);
    toast('申请提交成功');
  }
  
  Storage.set('camp_applications', apps);
  closeApplyModal();
}

// 打开我的申请列表
function openMyApplications() {
  var user = Storage.get('user', null);
  if (!user) {
    toast('请先登录');
    return;
  }
  
  var apps = Storage.get('camp_applications', []);
  var myApps = apps.filter(function(app) {
    return app.userId === user.id;
  });
  
  var listEl = document.getElementById('myAppList');
  
  if (myApps.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span><div>暂无申请记录</div></div>';
  } else {
    listEl.innerHTML = '';
    myApps.forEach(function(app) {
      var card = document.createElement('div');
      card.className = 'app-card status-' + app.status;
      
      var statusText = '';
      if (app.status === 'waiting') statusText = '待审核';
      else if (app.status === 'pass') statusText = '已通过';
      else if (app.status === 'reject') statusText = '已拒绝';
      
      card.innerHTML = '<div class="app-card-top">' +
        '<span class="app-card-name">' + app.name + '</span>' +
        '<span class="app-card-status ' + app.status + '">' + statusText + '</span>' +
        '</div>' +
        '<div class="app-card-info">价格：¥' + app.price + '/' + app.unit + '</div>' +
        '<div class="app-card-actions">' +
        '<button class="btn-edit" onclick="openApplyModal(\'' + app.id + '\')">编辑</button>' +
        '<button class="btn-delete" onclick="deleteApplication(\'' + app.id + '\')">删除</button>' +
        '</div>';
      
      listEl.appendChild(card);
    });
  }
  
  document.getElementById('myAppModal').classList.add('show');
}

// 关闭我的申请弹窗
function closeMyAppModal() {
  document.getElementById('myAppModal').classList.remove('show');
}

// 删除申请
function deleteApplication(appId) {
  if (!confirm('确定要删除此申请吗？')) return;
  
  var apps = Storage.get('camp_applications', []);
  apps = apps.filter(function(app) {
    return app.id !== appId;
  });
  
  Storage.set('camp_applications', apps);
  toast('删除成功');
  openMyApplications(); // 刷新列表
}

// 页面加载完成后初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>

 <style> /* village-h5 全局样式 主题绿色 #2E7D32 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
 background-color: #f5f5f5;
 color: #333;
 font-size: 14px;
 line-height: 1.5;
}
.header {
 position: fixed;
 top: 0;
 left: 0;
 right: 0;
 background: linear-gradient(135deg, #2E7D32, #4CAF50);
 color: white;
 padding: 12px 16px;
 z-index: 100;
 display: flex;
 align-items: center;
 justify-content: space-between;
 box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header-title { font-size: 18px; font-weight: bold; }
.header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }
.container {
 padding: 60px 16px 80px;
 max-width: 750px;
 margin: 0 auto;
}
.search-bar {
 background: white;
 border-radius: 25px;
 padding: 10px 16px;
 margin: 12px 0;
 display: flex;
 align-items: center;
 gap: 8px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.08);
 cursor: pointer;
}
.search-bar input {
 border: none;
 outline: none;
 flex: 1;
 font-size: 14px;
 background: transparent;
}
.banner-swiper {
 border-radius: 12px;
 overflow: hidden;
 height: 180px;
 margin-bottom: 16px;
}
.banner-swiper img {
 width: 100%;
 height: 100%;
 object-fit: cover;
}
.func-grid {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 12px;
 margin-bottom: 16px;
}
.func-item {
 background: white;
 border-radius: 12px;
 padding: 16px 8px;
 text-align: center;
 cursor: pointer;
 box-shadow: 0 2px 6px rgba(0,0,0,0.06);
 transition: transform 0.2s;
}
.func-item:active { transform: scale(0.95); }
.func-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.func-text { font-size: 12px; color: #666; }
.section-title {
 font-size: 16px;
 font-weight: bold;
 color: #333;
 margin-bottom: 12px;
 display: flex;
 align-items: center;
 justify-content: space-between;
}
.village-count { font-size: 12px; color: #999; font-weight: normal; }
.village-card {
 background: white;
 border-radius: 12px;
 padding: 16px;
 margin-bottom: 12px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.06);
 cursor: pointer;
 transition: transform 0.2s;
}
.village-card:active { transform: scale(0.98); }
.village-header {
 display: flex;
 justify-content: space-between;
 align-items: flex-start;
 margin-bottom: 12px;
}
.village-name { font-size: 16px; font-weight: bold; color: #2E7D32; }
.village-location { font-size: 12px; color: #999; margin-top: 2px; }
.village-population { text-align: right; }
.population-number { font-size: 20px; font-weight: bold; color: #FF9800; }
.population-label { font-size: 11px; color: #999; }
.village-stats {
 display: flex;
 gap: 8px;
 margin-bottom: 12px;
 padding: 10px;
 background: #f5f5f5;
 border-radius: 8px;
}
.stat-item { flex: 1; display: flex; align-items: center; gap: 6px; }
.stat-icon { font-size: 18px; }
.stat-value { font-size: 14px; font-weight: bold; color: #333; }
.stat-label { font-size: 11px; color: #999; }
.village-desc {
 font-size: 13px;
 color: #666;
 margin-bottom: 12px;
 line-height: 1.6;
}
.village-actions {
 display: flex;
 gap: 8px;
}
.action-btn {
 flex: 1;
 background: #f0f7f0;
 color: #2E7D32;
 border-radius: 20px;
 padding: 6px 0;
 text-align: center;
 font-size: 12px;
 cursor: pointer;
}
.action-btn:active { background: #2E7D32; color: white; }
.tab-bar {
 position: fixed;
 bottom: 0;
 left: 0;
 right: 0;
 background: white;
 display: flex;
 justify-content: space-around;
 padding: 8px 0;
 box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
 z-index: 100;
}
.tab-item {
 text-align: center;
 cursor: pointer;
 padding: 4px 0;
}
.tab-icon { font-size: 24px; display: block; }
.tab-text { font-size: 11px; color: #999; margin-top: 2px; }
.tab-item.active .tab-text { color: #2E7D32; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; }
.form-input {
 width: 100%;
 padding: 10px 12px;
 border: 1px solid #e0e0e0;
 border-radius: 8px;
 font-size: 14px;
 outline: none;
 transition: border-color 0.2s;
}
.form-input:focus { border-color: #2E7D32; }
.btn-primary {
 width: 100%;
 padding: 12px;
 background: #2E7D32;
 color: white;
 border: none;
 border-radius: 8px;
 font-size: 16px;
 cursor: pointer;
}
.btn-primary:active { background: #1B5E20; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
.toast {
 position: fixed;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 background: rgba(0,0,0,0.75);
 color: white;
 padding: 12px 24px;
 border-radius: 8px;
 font-size: 14px;
 z-index: 9999;
 animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
.loading { text-align: center; padding: 20px; color: #999; }
.load-more { text-align: center; padding: 16px; color: #999; font-size: 13px; cursor: pointer; }
.share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-end; }
.share-modal.show { display: flex; }
.share-panel { background: white; width: 100%; padding: 20px; border-radius: 16px 16px 0 0; }
.share-title { text-align: center; font-size: 14px; color: #666; margin-bottom: 16px; }
.share-icons { display: flex; justify-content: space-around; }
.share-icon-item { text-align: center; cursor: pointer; }
.share-icon-item span { font-size: 40px; display: block; margin-bottom: 6px; }
.share-icon-item small { font-size: 12px; color: #666; }
.share-close { margin-top: 12px; text-align: center; color: #999; padding: 10px; cursor: pointer; }
.announcement-section {
 background: white;
 border-radius: 12px;
 padding: 14px 16px;
 margin-bottom: 16px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.06);
 border-left: 4px solid #FF9800;
}
.announcement-header { display: flex; align-items: center; margin-bottom: 10px; }
.announcement-item {
 padding: 8px 0;
 border-bottom: 1px solid #f0f0f0;
 cursor: pointer;
}
.announcement-item:last-child { border-bottom: none; }
.announcement-title { font-size: 14px; color: #333; font-weight: bold; margin-bottom: 2px; }
.announcement-meta { font-size: 11px; color: #999; }
.announcement-content { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.6; display: none; }
.announcement-item.expanded .announcement-content { display: block; }
.landscape-card {
 flex-shrink: 0;
 width: 140px;
 background: white;
 border-radius: 12px;
 padding: 16px 12px;
 text-align: center;
 box-shadow: 0 2px 8px rgba(0,0,0,0.06);
 cursor: pointer;
}
.landscape-card:active { transform: scale(0.95); }
.landscape-avatar {
 width: 60px;
 height: 60px;
 border-radius: 50%;
 background: linear-gradient(135deg, #2E7D32, #4CAF50);
 color: white;
 font-size: 28px;
 line-height: 60px;
 margin: 0 auto 10px;
}
.landscape-name { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 4px; }
.landscape-desc { font-size: 11px; color: #999; line-height: 1.4; }
@media (max-width: 375px) {
 .func-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
 .func-item { padding: 12px 4px; }
 .func-text { font-size: 11px; }
}
 </style>
</head>

<script>
const DB = {
 villages: [
 {
 id: 'v1',
 name: '幸福村',
 province: '江苏省',
 city: '苏州市',
 population: '3280',
 totalArea: '4500',

 chief: { name: '张建国', phone: '13800138001' },
 scenery: [],

 },
 {
 id: 'v2',
 name: '阳光村',
 province: '广东省',
 city: '广州市',
 population: '4560',
 totalArea: '6200',
 farmlandArea: '3500',
 commercialArea: '350',
 description: '阳光村是广州市郊的现代化农村，积极发展乡村旅游和生态农业。村内有大型草莓采摘园、农家乐设施，是城市居民周末体验田园生活的好选择。',
 chief: { name: '李明华', phone: '13800138002' },
 scenery: [],
 food: [],
 images: []
 },
 {
 id: 'v3',
 name: '青山村',
 province: '湖南省',
 city: '长沙市',
 population: '2150',
 totalArea: '3800',
 farmlandArea: '1800',
 commercialArea: '150',
 description: '青山村坐落于长株潭后花园，森林覆盖率超过70%，空气清新，是天然的氧吧。村内有古民居、古井等历史遗迹，适合徒步探险和研学旅行。',
 chief: { name: '王志强', phone: '13800138003' },
 scenery: [],
 food: [],
 images: []
 }
 ],
 products: [],
 camps: [],
 roles: [],
 messages: [],
 favorites: [],
 history: []
};

function genId() {
 return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}
function formatTime(ts) {
 const d = new Date(ts);
 const now = Date.now();
 const diff = now - ts;
 if (diff < 60000) return '刚刚';
 if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
 if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
 return d.toLocaleDateString('zh-CN');
}
function toast(msg, duration) {
 duration = duration || 2000;
 const existing = document.querySelector('.toast');
 if (existing) existing.remove();
 const el = document.createElement('div');
 el.className = 'toast';
 el.textContent = msg;
 document.body.appendChild(el);
 setTimeout(function() { el.remove(); }, duration);
}

// XSS HTML转义
function escapeHtml(str) {
 if (!str) return '';
 return String(str)
 .replace(/&/g, '&amp;')
 .replace(/</g, '&lt;')
 .replace(/>/g, '&gt;')
 .replace(/"/g, '&quot;')
 .replace(/'/g, '&#039;');
}

// 存储层【增加云同步回调】
const Storage = {
 get: function(key, defaultVal) {
 try {
 const v = localStorage.getItem('village_' + key);
 return v ? JSON.parse(v) : defaultVal;
 } catch(e) {
 return defaultVal;
 }
 },
 set: function(key, val) {
 localStorage.setItem('village_' + key, JSON.stringify(val));
 // 云同步推送（兼容cloud_db.js）
 if(window._cloud && typeof window._cloud.push === 'function'){
 window._cloud.push(key, val);
 }
 }
};

function initSampleData() {
 if (!localStorage.getItem('village_villages')) Storage.set('villages', DB.villages);
 if (!localStorage.getItem('village_messages')) Storage.set('messages', []);
 if (!localStorage.getItem('village_favorites')) Storage.set('favorites', []);
 if (!localStorage.getItem('village_history')) Storage.set('history', []);
 if (!localStorage.getItem('village_products')) Storage.set('products', []);
 if (!localStorage.getItem('village_foods')) Storage.set('foods', []);
 if (!localStorage.getItem('village_camps')) Storage.set('camps', []);
 if (!localStorage.getItem('village_product_applications')) Storage.set('product_applications', []);
 if (!localStorage.getItem('village_food_applications')) Storage.set('food_applications', []);
 if (!localStorage.getItem('village_camp_applications')) Storage.set('camp_applications', []);
}

function migrateData() {
 try {
 var old = localStorage.getItem('registered_users');
 if (old) {
 var arr = JSON.parse(old);
 if (Array.isArray(arr) && arr.length > 0) {
 var cur = Storage.get('registrations', []);
 arr.forEach(function(item) {
 if (!cur.find(function(c) { return c.id === item.id; })) cur.push(item);
 });
 Storage.set('registrations', cur);
 }
 }
 } catch(e) {}
 try {
 var old2 = localStorage.getItem('village_registrations');
 if (old2) {
 var arr2 = JSON.parse(old2);
 if (Array.isArray(arr2) && arr2.length > 0) {
 var cur2 = Storage.get('registrations', []);
 arr2.forEach(function(item) {
 if (!cur2.find(function(c) { return c.id === item.id; })) cur2.push(item);
 });
 Storage.set('registrations', cur2);
 }
 }
 } catch(e) {}
}

let currentUser = Storage.get('user', null);
function login(nickName, avatarUrl) {
 currentUser = { id: genId(), nickName: nickName, avatarUrl: avatarUrl, time: Date.now() };
 Storage.set('user', currentUser);
 return currentUser;
}
function logout() {
 currentUser = null;
 localStorage.removeItem('village_user');
}

let pageSize = 10;
let pageIndex = 0;
let currentFilter = null;
let currentBanner = 0;
let bannerTimer = null;

function goVillageDetail(id) {
 location.href = 'village-detail.html?id=' + escapeHtml(id);
}

function goDesignerDetail(id) {
 toast('设计师详情页开发中');
}

function loadLandscapeDesigners() {
 var section = document.getElementById('landscapeSection');
 var list = document.getElementById('landscapeList');
 var count = document.getElementById('landscapeCount');
 if (!section || !list) return;
 var registrations = Storage.get('registrations', []);
 var designers = [];
 for (var i = 0; i < registrations.length; i++) {
 var r = registrations[i];
 if (r.role === '建筑园林设计师' && (r.status === '已通过' || r.status === 'approved')) {
 designers.push(r);
 }
 }
 if (designers.length === 0) {
 section.style.display = 'none';
 return;
 }
 section.style.display = 'block';
 count.textContent = '共 ' + designers.length + ' 位设计师';
 var html = '';
 for (var j = 0; j < designers.length; j++) {
 var d = designers[j];
 var avatar = d.avatarUrl || '🏗️';
 var name = escapeHtml(d.nickName || d.name || '设计师');
 var desc = escapeHtml(d.desc || '专业建筑园林设计');
 html += '<div class="landscape-card" onclick="goDesignerDetail(\'' + escapeHtml(d.id) + '\')">' +
 '<div class="landscape-avatar">' + avatar + '</div>' +
 '<div class="landscape-name">' + name + '</div>' +
 '<div class="landscape-desc">' + desc + '</div>' +
 '</div>';
 }
 list.innerHTML = html;
}

function init() {
 initSampleData();
 migrateData();
 renderBanner();
 loadAnnouncements();
 renderVillages();
 loadLandscapeDesigners();
}

function renderBanner() {
 var banners = [
 { title: '美丽乡村计划', color: '#2E7D32', icon: '🏘️' },
 { title: '乡村振兴进行时', color: '#4CAF50', icon: '🌾' },
 { title: '共建美好家园', color: '#1B5E20', icon: '🌳' }
 ];
 var el = document.getElementById('bannerSwiper');
 el.style.position = 'relative';
 var html = '';
 for (var bi = 0; bi < banners.length; bi++) {
 var b = banners[bi];
 html += '<div id="banner' + bi + '" style="position:absolute;top:0;left:0;width:100%;height:100%;background:' + b.color + ';display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;opacity:' + (bi === 0 ? '1' : '0') + ';transition:opacity 0.8s">' +
 '<span style="font-size:48px">' + b.icon + '</span>' +
 '<span style="font-size:18px;margin-top:8px;font-weight:bold">' + escapeHtml(b.title) + '</span>' +
 '</div>';
 }
 el.innerHTML = html;
 var items = [];
 for (var ki = 0; ki < banners.length; ki++) items.push(document.getElementById('banner' + ki));
 if (bannerTimer) clearInterval(bannerTimer);
 bannerTimer = setInterval(function() {
 items[currentBanner].style.opacity = '0';
 currentBanner = (currentBanner + 1) % banners.length;
 items[currentBanner].style.opacity = '1';
 }, 3000);
}

function renderVillages() {
 var all = Storage.get('villages', DB.villages) || [];
 var filtered = currentFilter ? filterVillages(all, currentFilter) : all;
 var pageCount = (pageIndex + 1) * pageSize;
 var list = filtered.slice(0, pageCount);
 var hasMore = filtered.length > list.length;
 document.getElementById('villageCount').textContent = '共 ' + filtered.length + ' 个村庄';
 document.getElementById('loadMore').style.display = hasMore ? 'block' : 'none';
 var container = document.getElementById('villageList');
 if (!container) return;
 if (list.length === 0) {
 container.innerHTML = '<div class="empty-state"><span class="empty-icon">🏘️</span><span>暂无村庄数据</span></div>';
 return;
 }
 var html = '';
 for (var i = 0; i < list.length; i++) {
 var v = list[i];
 var name = escapeHtml(v.name || '');
 var province = escapeHtml(v.province || '');
 var city = escapeHtml(v.city || '');
 var population = escapeHtml(v.population || '');
 var totalArea = escapeHtml(v.totalArea || '');
 var farmlandArea = escapeHtml(v.farmlandArea || '');
 var desc = escapeHtml(v.description || '');
 var phone = (v.chief && v.chief.phone) ? escapeHtml(v.chief.phone) : '';
 html += '<div class="village-card" onclick="goVillageDetail(\'' + escapeHtml(v.id) + '\')">' +
 '<div class="village-header">' +
 '<div>' +
 '<div class="village-name">' + name + '</div>' +
 '<div class="village-location">📍 ' + province + ' ' + city + '</div>' +
 '</div>' +
 '<div class="village-population">' +
 '<div class="population-number">' + population + '</div>' +
 '<div class="population-label">人口</div>' +
 '</div>' +
 '</div>' +
 '<div class="village-stats">' +
 '<div class="stat-item"><span class="stat-icon">🗺️</span><div><div class="stat-value">' + totalArea + '</div><div class="stat-label">总面积(亩)</div></div></div>' +
 '<div class="stat-item"><span class="stat-icon">🌾</span><div><div class="stat-value">' + farmlandArea + '</div><div class="stat-label">耕地(亩)</div></div></div>' +
 '</div>' +
 '<div class="village-desc">' + desc + '</div>' +
 '<div class="village-actions">' +
 '<div class="action-btn" onclick="event.stopPropagation();goPage(\'scenery.html?id=' + escapeHtml(v.id) + '\')">🌄 风景</div>' +
 '<div class="action-btn" onclick="event.stopPropagation();goPage(\'food.html?id=' + escapeHtml(v.id) + '\')">🍜 美食</div>' +
 '<div class="action-btn" onclick="event.stopPropagation();goPage(\'planning.html?id=' + escapeHtml(v.id) + '\')">📈 规划</div>' +
 '<div class="action-btn" onclick="event.stopPropagation();callChief(\'' + phone + '\')">📞 联系</div>' +
 '</div>' +
 '</div>';
 }
 container.innerHTML = html;
}

function filterVillages(list, type) {
 if (type === 'province') {
 var provinces = [];
 var seen = {};
 for (var pi = 0; pi < list.length; pi++) {
 var p = list[pi].province;
 if (p && !seen[p]) { seen[p] = true; provinces.push(p); }
 }
 var options = provinces.map(function(pp, idx) { return (idx + 1) + '. ' + pp; }).join('\n');
 var selected = prompt('选择地区：\n' + options);
 if (!selected) return list;
 var idx2 = parseInt(selected) - 1;
 return idx2 >= 0 && idx2 < provinces.length ? list.filter(function(vv) { return vv.province === provinces[idx2]; }) : list;
 }
 return list;
}

function filterBy(type) {
 pageIndex = 0;
 currentFilter = type;
 renderVillages();
}

function loadMore() {
 pageIndex++;
 renderVillages();
}

function showSearch() {
 var kw = prompt('输入村庄名称搜索：');
 if (!kw) return;
 var all = Storage.get('villages', DB.villages) || [];
 var found = null;
 for (var fi = 0; fi < all.length; fi++) {
 if ((all[fi].name || '').indexOf(kw) >= 0) { found = all[fi]; break; }
 }
 if (found) goVillageDetail(found.id);
 else toast('未找到匹配的村庄');
}

function addHistory(item) {
 var h = Storage.get('history', []);
 h.unshift(item);
 Storage.set('history', h.slice(0, 100));
}

function showShare() {
 document.getElementById('shareModal').classList.add('show');
}
function closeShare() {
 document.getElementById('shareModal').classList.remove('show');
}
function shareTo(app) {
 toast('请使用浏览器分享功能');
 closeShare();
}
function shareCopy() {
 var text = location.href;
 if (navigator.clipboard && navigator.clipboard.writeText) {
 navigator.clipboard.writeText(text).then(function() { toast('链接已复制'); }).catch(function() { doCopy(text); });
 } else {
 doCopy(text);
 }
 closeShare();
}
function doCopy(text) {
 var ta = document.createElement('textarea');
 ta.value = text;
 document.body.appendChild(ta);
 ta.select();
 try { document.execCommand('copy'); } catch(e) {}
 document.body.removeChild(ta);
 toast('链接已复制');
}

function loadAnnouncements() {
 var announcements = Storage.get('announcements', []);
 var section = document.getElementById('announcementSection');
 var list = document.getElementById('announcementList');
 var badge = document.getElementById('announcementBadge');
 if (!announcements || announcements.length === 0) {
 section.style.display = 'none';
 return;
 }
 section.style.display = 'block';
 var now = Date.now();
 var hasNew = false;
 for (var ai = 0; ai < announcements.length; ai++) {
 if (now - (announcements[ai].createTime || announcements[ai].time) < 86400000) { hasNew = true; break; }
 }
 badge.style.display = hasNew ? 'inline-block' : 'none';
 var html = '';
 for (var aj = 0; aj < announcements.length; aj++) {
 var a = announcements[aj];
 var isNew = now - (a.createTime || a.time) < 86400000;
 var title = escapeHtml(a.title);
 var content = escapeHtml(a.content || '');
 var timeStr = formatAnnTime(a.createTime || a.time);
 html += '<div class="announcement-item" onclick="toggleAnnouncement(' + aj + ')">' +
 '<div class="announcement-title">' + (isNew ? '🆕 ' : '') + title + '</div>' +
 '<div class="announcement-meta">' + timeStr + '</div>' +
 '<div class="announcement-content" id="annContent' + aj + '">' + content + '</div>' +
 '</div>';
 }
 list.innerHTML = html;
}

function toggleAnnouncement(idx) {
 var el = document.getElementById('annContent' + idx);
 if (!el) return;
 el.parentElement.classList.toggle('expanded');
}

function formatAnnTime(ts) {
 var d = new Date(ts);
 var now = Date.now();
 var diff = now - ts;
 if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
 if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
 return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function goPage(url) {
 location.href = url;
}

function goProfile() {
 var user = localStorage.getItem('village_user');
 if (!user) location.href = 'login.html';
 else location.href = 'profile.html';
}

function callChief(phone) {
 if (!phone) {
 toast('暂无村长联系电话');
 return;
 }
 window.location.href = 'tel:' + phone;
}

// 初始化入口
// 等待cloud_db.js加载完成，弱网手机也会重试连接
function bootstrap() {
 if (window.CloudDB && window.CloudDB.ready) {
   window.CloudDB.ready.then(function() { init(); });
 } else {
   setTimeout(bootstrap, 200);
 }
}
bootstrap();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食预订</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    .header { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #2E7D32, #4CAF50); color: white; padding: 12px 16px; z-index: 100; display: flex; align-items: center; }
    .header-back { font-size: 20px; cursor: pointer; padding-right: 12px; }
    .header-title { font-size: 18px; font-weight: bold; }
    .container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }
    .detail-section { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 10px; }
    .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: 500; }
    .form-input { width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #2E7D32; }
    .form-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .form-row-label { color: #666; font-size: 13px; }
    .form-row-value { font-size: 14px; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #2E7D32, #4CAF50); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(46,125,50,0.3); margin-top: 8px; }
    .btn-primary:active { transform: scale(0.98); }
    .goods-price { font-size: 18px; color: #FF9800; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">美食预订</span>
  </div>
  <div class="container" id="orderForm"></div>
<script src="app.js"></script>
<script>
function init() {
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  // 优先从 Storage 实际数据，兜底用 DB 示例
  var storageFoods = [];
  try { storageFoods = JSON.parse(localStorage.getItem('village_foods') || '[]'); } catch(e) {}
  if (storageFoods.length === 0) { try { storageFoods = JSON.parse(localStorage.getItem('foods') || '[]'); } catch(e) {} }
  var f = storageFoods.find(function(x){ return x.id === id; }) || { name:'未知美食', price:'0', unit:'份', desc:'', img:'' };

  document.getElementById('orderForm').innerHTML = '\
    <div class="detail-section">\
      <div style="display:flex;gap:12px;align-items:center">\
        <img src="' + (f.img||'') + '" style="width:80px;height:80px;border-radius:8px;object-fit:cover;background:#f0f0f0;" onerror="this.style.display=\'none\';this.parentElement.innerHTML+=\'<div style=width:80px;height:80px;border-radius:8px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:36px;>🍜</div>\'">\
        <div>\
          <div style="font-size:15px;font-weight:bold">' + f.name + '</div>\
          <div style="font-size:12px;color:#666;margin:4px 0">' + (f.desc||'') + '</div>\
          <div class="goods-price">¥' + f.price + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + f.unit + '</span></div>\
        </div>\
      </div>\
    </div>\
    <div class="form-card">\
      <div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="name" placeholder="请输入您的姓名"></div>\
      <div class="form-group"><label class="form-label">联系电话 *</label><input class="form-input" id="phone" type="tel" placeholder="请输入手机号" maxlength="11"></div>\
      <div class="form-group"><label class="form-label">数量</label>\
        <div style="display:flex;align-items:center;gap:12px">\
          <button onclick="changeQty(-1)" style="width:32px;height:32px;border:1px solid #e0e0e0;border-radius:50%;background:white;font-size:18px;cursor:pointer">−</button>\
          <span id="qty" style="font-size:18px;font-weight:bold;min-width:30px;text-align:center">1</span>\
          <button onclick="changeQty(1)" style="width:32px;height:32px;border:1px solid #e0e0e0;border-radius:50%;background:white;font-size:18px;cursor:pointer">+</button>\
        </div>\
      </div>\
      <div class="form-group"><label class="form-label">取餐时间</label><input class="form-input" id="pickupTime" type="time" style="font-size:13px" value="12:00"></div>\
      <div class="form-group"><label class="form-label">备注</label><input class="form-input" id="note" placeholder="口味要求等"></div>\
    </div>\
    <div class="form-card">\
      <div class="form-row"><div class="form-row-label">单价</div><div class="form-row-value">¥' + f.price + ' / ' + f.unit + '</div></div>\
      <div class="form-row"><div class="form-row-label">数量</div><div class="form-row-value" id="qtyText">1</div></div>\
      <div class="form-row"><div class="form-row-label">支付方式</div><div class="form-row-value">到店支付</div></div>\
      <div class="form-row" style="border:none"><div class="form-row-label" style="font-weight:bold">合计</div><div class="form-row-value goods-price" id="total">¥' + f.price + '</div></div>\
    </div>\
    <button class="btn-primary" onclick="submitOrder()">提交订单</button>\
    <div style="text-align:center;margin-top:12px;font-size:12px;color:#999">到店请出示订单，商家将与您联系确认</div>';

  window._foodPrice = parseFloat(f.price) || 0;
}

function changeQty(delta) {
  var qty = Math.max(1, Math.min(10, parseInt(document.getElementById('qty').textContent) + delta));
  document.getElementById('qty').textContent = qty;
  document.getElementById('qtyText').textContent = qty;
  document.getElementById('total').textContent = '¥' + (window._foodPrice * qty);
}

function submitOrder() {
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var qty = parseInt(document.getElementById('qty').textContent);
  var pickupTime = document.getElementById('pickupTime').value;
  var note = document.getElementById('note').value.trim();
  if (!name || !phone) { alert('请填写姓名和电话'); return; }
  if (!/^1\d{10}$/.test(phone)) { alert('请输入正确的手机号'); return; }

  var user = Storage.get('user', null);
  var order = {
    id: genId(),
    type: 'food',
    foodId: new URLSearchParams(location.search).get('id'),
    foodName: f.name,
    sellerId: f.sellerId||'',
    sellerName: f.sellerName||'',
    name: name,
    phone: phone,
    qty: qty,
    pickupTime: pickupTime,
    total: window._foodPrice * qty,
    note: note,
    buyerId: user ? user.id : '',
    buyerName: user ? user.nickName : '',
    status: '待消费',
    createTime: Date.now()
  };
  var orders = Storage.get('orders', []);
  orders.push(order);
  Storage.set('orders', orders);
  alert('订单提交成功！到店请出示。');
  history.back();
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>露营预订</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#f5f5f5;color:#333;font-size:14px}
.header{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;padding:12px 16px;z-index:100;display:flex;align-items:center}
.header-back{font-size:20px;cursor:pointer;padding-right:12px}
.header-title{font-size:18px;font-weight:bold}
.container{padding:60px 16px 80px;max-width:750px;margin:0 auto}
.section{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-group{margin-bottom:12px}
.form-label{font-size:13px;color:#666;margin-bottom:4px;display:block;font-weight:500}
.form-input{width:100%;border:1px solid #e0e0e0;border-radius:6px;padding:9px 10px;font-size:14px;outline:none}
.form-input:focus{border-color:#2E7D32}
.qty-box{display:flex;align-items:center;gap:12px}
.qty-btn{width:32px;height:32px;border:1px solid #e0e0e0;border-radius:50%;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:18px;font-weight:bold;min-width:30px;text-align:center}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.row:last-child{border:none}
.row-label{color:#666;font-size:13px}
.row-val{font-size:14px;font-weight:500}
.total-price{font-size:18px;color:#FF9800;font-weight:bold}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px;box-shadow:0 2px 8px rgba(46,125,50,.3)}
.btn-submit:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="header">
  <span class="header-back" onclick="history.back()">←</span>
  <span class="header-title">露营预订</span>
</div>
<div class="container" id="app"></div>
<script src="app.js"></script>
<script>
var _camp=null,_price=0,_qty=1;

function init(){
  var params=new URLSearchParams(location.search);
  var id=params.get('id');
  var camps=Storage.get('camps',[]);
  if(!camps.length){try{camps=JSON.parse(localStorage.getItem('village_camps')||'[]');}catch(e){}}
  _camp=null;
  for(var i=0;i<camps.length;i++){if(camps[i].id===id){_camp=camps[i];break;}}
  if(!_camp)_camp={name:'未知营地',price:'0',unit:'顶/晚',desc:'',tags:[],img:'',sellerId:''};
  _price=parseFloat(_camp.price)||0;

  var tagsHtml='';
  if(_camp.tags){for(var t=0;t<_camp.tags.length;t++)tagsHtml+='<span style="background:#e8f5e9;color:#2E7D32;padding:2px 6px;border-radius:4px;font-size:11px;margin-right:4px">'+_camp.tags[t]+'</span>';}

  document.getElementById('app').innerHTML=
    '<div class="section"><div style="display:flex;gap:12px;align-items:center">'+
      '<img src="'+(_camp.img||'')+'" style="width:80px;height:80px;border-radius:8px;object-fit:cover;background:#f0f0f0" onerror="this.style.display=\'none\'">'+
      '<div><div style="font-size:15px;font-weight:600">'+_camp.name+'</div>'+
      '<div style="font-size:12px;color:#666;margin:4px 0">'+(_camp.desc||'')+'</div>'+
      '<div class="total-price">¥'+_camp.price+'<span style="font-size:12px;color:#999;font-weight:normal">/'+_camp.unit+'</span></div>'+
      '<div style="margin-top:4px">'+tagsHtml+'</div>'+
      '</div></div></div>'+
    '<div class="section">'+
      '<div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="buyerName" placeholder="请输入您的姓名"></div>'+
      '<div class="form-group"><label class="form-label">联系电话 *</label><input class="form-input" id="buyerPhone" type="tel" maxlength="11" placeholder="请输入手机号"></div>'+
      '<div class="form-group"><label class="form-label">地址</label><input class="form-input" id="buyerAddr" placeholder="选填"></div>'+
      '<div class="form-group"><label class="form-label">入住日期 *</label><input class="form-input" id="checkin" type="date"></div>'+
      '<div class="form-group"><label class="form-label">帐篷数量</label>'+
        '<div class="qty-box">'+
          '<span class="qty-btn" onclick="changeQty(-1)">−</span>'+
          '<span class="qty-num" id="qtyNum">1</span>'+
          '<span class="qty-btn" onclick="changeQty(1)">+</span>'+
        '</div></div>'+
      '<div class="form-group"><label class="form-label">备注</label><input class="form-input" id="remark" placeholder="如：带宠物、特殊需求"></div>'+
    '</div>'+
    '<div class="section">'+
      '<div class="row"><span class="row-label">单价</span><span class="row-val">¥'+_camp.price+' / '+_camp.unit+'</span></div>'+
      '<div class="row"><span class="row-label">数量</span><span class="row-val" id="rowQty">1</span></div>'+
      '<div class="row"><span class="row-label" style="font-weight:bold">合计</span><span class="row-val total-price" id="rowTotal">¥'+_price+'</span></div>'+
    '</div>'+
    '<button class="btn-submit" onclick="submitOrder()">提交预订</button>';

  // 默认明天
  var tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('checkin').value=tomorrow.toISOString().split('T')[0];

  // 自动填充用户信息
  var user=Storage.get('user',null);
  if(user){
    if(user.nickName)document.getElementById('buyerName').value=user.nickName;
    if(user.phone)document.getElementById('buyerPhone').value=user.phone;
    if(user.address)document.getElementById('buyerAddr').value=user.address;
  }
}

function changeQty(d){
  _qty=Math.max(1,Math.min(10,_qty+d));
  document.getElementById('qtyNum').textContent=_qty;
  document.getElementById('rowQty').textContent=_qty;
  document.getElementById('rowTotal').textContent='¥'+(_price*_qty);
}

function submitOrder(){
  var name=document.getElementById('buyerName').value.trim();
  var phone=document.getElementById('buyerPhone').value.trim();
  var addr=document.getElementById('buyerAddr').value.trim();
  var checkin=document.getElementById('checkin').value;
  var remark=document.getElementById('remark').value.trim();
  if(!name||!phone||!checkin){alert('请填写姓名、电话和入住日期');return;}
  if(!/^1\d{10}$/.test(phone)){alert('请输入正确的手机号');return;}

  var user=Storage.get('user',null);
  // 保存到用户资料
  if(user){
    var updated=false;
    if(!user.phone && phone){user.phone=phone;updated=true;}
    if(!user.address && addr){user.address=addr;updated=true;}
    if(updated)Storage.set('user',user);
  }

  var orders=Storage.get('orders',[]);
  orders.push({
    id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),
    type:'camp',
    campId:_camp.id,
    campName:_camp.name,
    sellerId:_camp.sellerId||'',
    sellerName:_camp.sellerName||'',
    price:_camp.price,
    unit:_camp.unit,
    qty:_qty,
    total:_price*_qty,
    buyerName:name,
    buyerPhone:phone,
    buyerAddr:addr,
    buyerId:user?user.account||user.id:'',
    checkin:checkin,
    remark:remark,
    status:'待确认',
    createTime:Date.now()
  });
  Storage.set('orders',orders);

  // 更新销量
  var camps=Storage.get('camps',[]);
  for(var i=0;i<camps.length;i++){
    if(camps[i].id===_camp.id){
      camps[i].sales=(parseInt(camps[i].sales)||0)+_qty;
      break;
    }
  }
  Storage.set('camps',camps);

  alert('预订成功！商家将尽快与您联系确认。');
  history.back();
}

init();
</script>
</body>
</html>

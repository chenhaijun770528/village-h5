<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>露营预订</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
    .header { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #2E7D32, #4CAF50); color: white; padding: 12px 16px; z-index: 100; display: flex; align-items: center; }
    .header-back { font-size: 20px; cursor: pointer; padding-right: 12px; }
    .header-title { font-size: 18px; font-weight: bold; }
    .container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }
    .detail-section { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 10px; }
    .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; font-weight: 500; }
    .form-input { width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #2E7D32; }
    .form-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .form-row-label { color: #666; font-size: 13px; }
    .form-row-value { font-size: 14px; font-weight: 500; }
    .btn-primary { background: linear-gradient(135deg, #2E7D32, #4CAF50); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 8px rgba(46,125,50,0.3); }
    .btn-primary:active { transform: scale(0.98); }
    .goods-price { font-size: 18px; color: #FF9800; font-weight: bold; }
    .camp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
    .camp-tag { background: #e8f5e9; color: #2E7D32; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .stock-info { background: #fff3e0; border-radius: 6px; padding: 10px; margin-top: 8px; font-size: 12px; color: #e65100; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">露营预订</span>
  </div>
  <div class="container" id="orderForm"></div>
<script src="app.js"></script>
<script>
function init() {
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  // 优先从 Storage 读实际数据，没有则用 DB 示例
  var storageCamps = [];
  try { storageCamps = JSON.parse(localStorage.getItem('village_camps') || '[]'); } catch(e) {}
  var c = storageCamps.find(function(x){ return x.id === id; }) || { name:'未知营地', price:'0', unit:'顶/晚', desc:'', tags:[], img:'' };

  document.getElementById('orderForm').innerHTML = '\
    <div class="detail-section">\
      <div style="display:flex;gap:12px;align-items:center">\
        <img src="' + (c.img||'') + '" style="width:80px;height:80px;border-radius:8px;object-fit:cover;background:#f0f0f0;" onerror="this.style.display=\'none\';this.parentElement.innerHTML+=\'<div style=width:80px;height:80px;border-radius:8px;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:36px;>⛺</div>\'">\
        <div>\
          <div style="font-size:15px;font-weight:bold">' + c.name + '</div>\
          <div style="font-size:12px;color:#666;margin:4px 0">' + (c.desc||'') + '</div>\
          <div class="goods-price">¥' + c.price + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + c.unit + '</span></div>\
          <div class="camp-tags">' + (function(){
            var tags = c.tags||[];
            var h = ''; for(var t=0;t<tags.length;t++) h+='<span class="camp-tag">'+tags[t]+'</span>'; return h;
          })() + '</div>\
        </div>\
      </div>\
    </div>\
    <div class="form-card">\
      <div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="name" placeholder="请输入您的姓名"></div>\
      <div class="form-group"><label class="form-label">联系电话 *</label><input class="form-input" id="phone" type="tel" placeholder="请输入手机号" maxlength="11"></div>\
      <div class="form-group">\
        <label class="form-label">入住日期 *</label>\
        <input class="form-input" id="checkin" type="date" style="font-size:13px">\
      </div>\
      <div class="form-group">\
        <label class="form-label">帐篷数量</label>\
        <div style="display:flex;align-items:center;gap:12px">\
          <button onclick="changeQty(-1)" style="width:32px;height:32px;border:1px solid #e0e0e0;border-radius:50%;background:white;font-size:18px;cursor:pointer">−</button>\
          <span id="qty" style="font-size:18px;font-weight:bold;min-width:30px;text-align:center">1</span>\
          <button onclick="changeQty(1)" style="width:32px;height:32px;border:1px solid #e0e0e0;border-radius:50%;background:white;font-size:18px;cursor:pointer">+</button>\
        </div>\
      </div>\
      <div class="form-group"><label class="form-label">备注</label><input class="form-input" id="note" placeholder="如：带宠物、特殊需求"></div>\
    </div>\
    <div class="form-card">\
      <div class="form-row"><div class="form-row-label">单价</div><div class="form-row-value">¥' + c.price + ' / ' + c.unit + '</div></div>\
      <div class="form-row"><div class="form-row-label">帐篷数量</div><div class="form-row-value" id="qtyText">1</div></div>\
      <div class="form-row"><div class="form-row-label">联系电话</div><div class="form-row-value">到付</div></div>\
      <div class="form-row" style="border:none"><div class="form-row-label" style="font-weight:bold">合计</div><div class="form-row-value goods-price" id="total">¥' + c.price + '</div></div>\
    </div>\
    <button class="btn-primary" onclick="submitOrder()">提交预订</button>\
    <div style="text-align:center;margin-top:12px;font-size:12px;color:#999">提交后商家将与您电话联系确认</div>';

  // 设置默认入住日期为明天
  var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('checkin').value = tomorrow.toISOString().split('T')[0];
  window._campPrice = parseFloat(c.price) || 0;
}

function changeQty(delta) {
  var qty = parseInt(document.getElementById('qty').textContent) + delta;
  if (qty < 1) qty = 1;
  if (qty > 10) qty = 10;
  document.getElementById('qty').textContent = qty;
  document.getElementById('qtyText').textContent = qty;
  document.getElementById('total').textContent = '¥' + (window._campPrice * qty);
}

function submitOrder() {
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var checkin = document.getElementById('checkin').value;
  var qty = parseInt(document.getElementById('qty').textContent);
  var note = document.getElementById('note').value.trim();
  if (!name || !phone || !checkin) { alert('请填写完整信息'); return; }
  if (!/^1\d{10}$/.test(phone)) { alert('请输入正确的手机号'); return; }

  var user = Storage.get('user', null);
  var order = {
    id: genId(),
    type: 'camp',
    campId: new URLSearchParams(location.search).get('id'),
    campName: document.querySelector('.detail-section .form-label + div') ? document.querySelector('.detail-section').querySelector('div').textContent : '',
    name: name,
    phone: phone,
    checkin: checkin,
    qty: qty,
    total: window._campPrice * qty,
    note: note,
    buyerId: user ? user.id : '',
    buyerName: user ? user.nickName : '',
    status: '待确认',
    createTime: Date.now()
  };
  var orders = Storage.get('orders', []);
  orders.push(order);
  Storage.set('orders', orders);
  alert('预订提交成功！商家将尽快与您联系确认。');
  history.back();
}

init();
</script>
</body>
</html>

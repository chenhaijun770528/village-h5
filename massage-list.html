<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script src="cloud_db.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按摩技师</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f5f5; color: #333; font-size: 14px; }
.header { position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(135deg, #2E7D32, #4CAF50); color: white; padding: 12px 16px; z-index: 100; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-title { font-size: 18px; font-weight: bold; }
.container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }
.section-head { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 12px; padding-left: 4px; }
.massage-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); display: flex; gap: 14px; position: relative; }
.massage-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid #2E7D32; flex-shrink: 0; background: #e8f5e9; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.massage-info { flex: 1; min-width: 0; }
.massage-name { font-size: 16px; font-weight: bold; color: #2E7D32; margin-bottom: 6px; }
.massage-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 13px; color: #555; }
.massage-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.massage-tag { background: #e8f5e9; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.call-btn { display: inline-flex; align-items: center; gap: 4px; background: #2E7D32; color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; margin-top: 8px; text-decoration: none; }
.call-btn:active { background: #1B5E20; }
.edit-btn { position: absolute; top: 12px; right: 12px; background: #FF9800; color: white; border: none; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.edit-btn:active { background: #F57C00; }
.empty-state { text-align: center; padding: 80px 20px; color: #999; }
.empty-icon { font-size: 64px; display: block; margin-bottom: 16px; }
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); z-index: 100; }
.tab-item { text-align: center; cursor: pointer; padding: 4px 0; }
.tab-icon { font-size: 24px; display: block; }
.tab-text { font-size: 11px; color: #999; margin-top: 2px; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-box { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 360px; max-height: 80vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: bold; color: #2E7D32; margin-bottom: 16px; text-align: center; }
.modal-field { margin-bottom: 14px; }
.modal-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
.modal-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.modal-input:focus { outline: none; border-color: #4CAF50; }
.modal-avatar-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #2E7D32; margin: 0 auto 10px; display: block; background: #e8f5e9; }
.modal-avatar-wrap { text-align: center; margin-bottom: 14px; }
.modal-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 8px; }
.modal-btn-save { background: #2E7D32; color: white; }
.modal-btn-cancel { background: #f5f5f5; color: #666; }
.upload-btn { display: inline-block; background: #FF9800; color: white; padding: 6px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; margin-top: 6px; }
</style>
</head>
<body>
<div class="header">
  <span style="font-size:20px;cursor:pointer;" onclick="history.back()">←</span>
  <span class="header-title">按摩技师</span>
  <span style="width:40px"></span>
</div>
<div class="container">
  <div class="section-head">已认证按摩技师 · <span id="count">0</span>人</div>
  <div id="list"></div>
</div>
<div class="tab-bar">
  <div class="tab-item" onclick="location.href='index.html'">
    <span class="tab-icon">🏠</span>
    <span class="tab-text">首页</span>
  </div>
  <div class="tab-item" onclick="location.href='register.html'">
    <span class="tab-icon">📝</span>
    <span class="tab-text">注册</span>
  </div>
  <div class="tab-item" onclick="location.href='profile.html'">
    <span class="tab-icon">👤</span>
    <span class="tab-text">我的</span>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-title">编辑我的资料</div>
    <div class="modal-avatar-wrap">
      <img id="editAvatarPreview" class="modal-avatar-preview" src="" alt="头像">
      <div>
        <label class="upload-btn">
          更换照片
          <input type="file" accept="image/*" id="editPhotoInput" style="display:none" onchange="handlePhotoSelect(this)">
        </label>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">联系电话</label>
      <input type="tel" class="modal-input" id="editPhone" placeholder="请输入联系电话">
    </div>
    <div class="modal-field">
      <label class="modal-label">当前地址</label>
      <input type="text" class="modal-input" id="editAddress" placeholder="请输入当前地址">
    </div>
    <button class="modal-btn modal-btn-save" onclick="saveEdit()">保存修改</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeEdit()">取消</button>
  </div>
</div>

<script>
var Storage = {
  get: function(k, d) {
    try { var v = localStorage.getItem("village_" + k); return v ? JSON.parse(v) : d; } catch(e) { return d; }
  },
  set: function(k, v) {
    try { localStorage.setItem("village_" + k, JSON.stringify(v)); return true; } catch(e) { return false; }
  }
};

function getCurrentUser() {
  return Storage.get("user", null);
}

function toast(msg) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2000);
}

var editingIndex = -1;

function openEdit(index) {
  var regs = Storage.get("registrations", []);
  var t = regs[index];
  if (!t) return;
  
  editingIndex = index;
  document.getElementById("editPhone").value = t.phone || "";
  document.getElementById("editAddress").value = t.curAddress || "";
  
  var avatarPreview = document.getElementById("editAvatarPreview");
  if (t.photo) {
    avatarPreview.src = t.photo;
  } else {
    avatarPreview.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='35' r='25' fill='%232E7D32'/%3E%3Cellipse cx='50' cy='85' rx='35' ry='25' fill='%232E7D32'/%3E%3C/svg%3E";
  }
  
  document.getElementById("editModal").classList.add("active");
}

function closeEdit() {
  document.getElementById("editModal").classList.remove("active");
  editingIndex = -1;
}

function handlePhotoSelect(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.type.indexOf("image") < 0) {
    toast("请选择图片文件");
    return;
  }
  
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement("canvas");
      var maxW = 800, maxH = 600;
      var w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      document.getElementById("editAvatarPreview").src = dataUrl;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveEdit() {
  if (editingIndex < 0) return;
  
  var regs = Storage.get("registrations", []);
  var t = regs[editingIndex];
  if (!t) {
    toast("数据错误");
    return;
  }
  
  var newPhone = document.getElementById("editPhone").value.trim();
  var newAddress = document.getElementById("editAddress").value.trim();
  var newPhoto = document.getElementById("editAvatarPreview").src;
  
  if (newPhone && !/^1\d{10}$/.test(newPhone)) {
    toast("请输入正确的手机号");
    return;
  }
  
  t.phone = newPhone;
  t.curAddress = newAddress;
  
  if (newPhoto && newPhoto.indexOf("data:image") === 0) {
    t.photo = newPhoto;
  }
  
  regs[editingIndex] = t;
  if (!Storage.set("registrations", regs)) {
    toast("保存失败，存储空间不足");
    return;
  }
  
  toast("修改成功");
  closeEdit();
  if(window.CloudDB){CloudDB.ready.then(init);}else{init();};
}

function init() {
  var regs = Storage.get("registrations", []);
  var currentUser = getCurrentUser();
  var list = document.getElementById("list");
  var countEl = document.getElementById("count");
  var therapists = [];
  
  for (var i = 0; i < regs.length; i++) {
    if ((regs[i].role === "按摩师" || regs[i].role === "按摩技师") && regs[i].status === "已通过") {
      therapists.push({ data: regs[i], index: i });
    }
  }
  
  countEl.textContent = therapists.length;
  
  if (therapists.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">💆</span><div>暂无认证按摩技师</div><div style="font-size:12px;margin-top:8px;">欢迎注册成为认证按摩技师</div></div>';
    return;
  }
  
  var html = "";
  for (var j = 0; j < therapists.length; j++) {
    var item = therapists[j];
    var t = item.data;
    var isOwner = currentUser && currentUser.phone === t.phone;
    
    var avatar = t.photo
      ? '<img src="' + t.photo + '" class="massage-avatar" style="object-fit:cover;">'
      : '<div class="massage-avatar">💆</div>';
    
    var phoneDisplay = t.phone || "未填写";
    var phoneBtn = t.phone
      ? '<a href="tel:' + t.phone + '" class="call-btn">📞 联系Ta</a>'
      : '';
    
    var location = t.curAddress || t.regAddress || "未填写";
    var skillTag = t.skill ? '<span class="massage-tag">' + t.skill + '</span>' : '';
    var yearsTag = t.years ? '<span class="massage-tag">' + t.years + '年经验</span>' : '';
    var villageTag = t.village ? '<span class="massage-tag">📍 ' + t.village + '</span>' : '';
    
    var editBtn = isOwner ? '<button class="edit-btn" onclick="openEdit(' + item.index + ')">编辑</button>' : '';
    
    html += '<div class="massage-card">' +
      avatar +
      '<div class="massage-info">' +
      '<div class="massage-name">' + (t.name || "未知") + '</div>' +
      '<div class="massage-row">📱 电话：' + phoneDisplay + '</div>' +
      '<div class="massage-row">📍 ' + location + '</div>' +
      '<div class="massage-tags">' + skillTag + yearsTag + villageTag + '</div>' +
      phoneBtn +
      '</div>' +
      editBtn +
      '</div>';
  }
  list.innerHTML = html;
}

if(window.CloudDB){CloudDB.ready.then(init);}else{init();};
</script>
</body>
</html>

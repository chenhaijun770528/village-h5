<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 村庄平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      color: white;
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-title { font-size: 18px; font-weight: bold; }
    .header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }

    /* 用户信息卡 */
    .user-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-avatar { font-size: 52px; }
    .user-info { flex: 1; }
    .user-name { font-size: 17px; font-weight: bold; color: #222; }
    .user-account { font-size: 12px; color: #999; margin-top: 3px; }
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 6px;
    }
    .role-none { background: #f5f5f5; color: #999; }
    .role-active { background: #E8F5E9; color: #2E7D32; }
    .role-pending { background: #FFF3E0; color: #E65100; }

    /* 快捷功能 */
    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #888;
      margin-bottom: 10px;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .menu-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #f9f9f9; }
    .menu-icon { font-size: 22px; margin-right: 12px; }
    .menu-text { flex: 1; font-size: 15px; color: #333; }
    .menu-arrow { font-size: 18px; color: #ccc; }
    .menu-badge {
      background: #F44336;
      color: white;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-right: 8px;
      font-weight: bold;
    }

    /* 村庄管理面板 */
    .village-panel {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .village-panel-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 审核列表项 */
    .audit-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #FF9800;
    }
    .audit-item.approved { border-left-color: #4CAF50; }
    .audit-item.rejected { border-left-color: #F44336; }
    .audit-name { font-size: 14px; font-weight: bold; color: #333; }
    .audit-info { font-size: 12px; color: #888; margin: 3px 0; }
    .audit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .audit-actions button {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-a-approve { background: #4CAF50; color: white; }
    .btn-a-reject { background: #F44336; color: white; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      width: 92%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
    }
    .modal-form-group {
      margin-bottom: 12px;
    }
    .modal-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
      display: block;
    }
    .modal-label .req { color: #F44336; }
    .modal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .modal-input:focus { border-color: #2E7D32; }
    .modal-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      height: 80px;
      resize: vertical;
      box-sizing: border-box;
    }
    .modal-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .modal-btn-save { background: #2E7D32; color: white; }
    .modal-btn-cancel { background: #f5f5f5; color: #666; margin-top: 6px; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 28px;
      color: #bbb;
      font-size: 14px;
    }

    /* 注册审核提示 */
    .pending-notice {
      background: #FFF8E1;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #795548;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* 退出按钮 */
    .btn-logout {
      width: 100%;
      padding: 13px;
      background: white;
      color: #F44336;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">个人中心</span>
    <span style="width:40px"></span>
  </div>

  <div class="container" id="mainContent">
    加载中...
  </div>

  <script>
    var Storage = {
      get: function(key, defaultVal) {
        try {
          var v = localStorage.getItem('village_' + key);
          return v ? JSON.parse(v) : defaultVal;
        } catch(e) { return defaultVal; }
      },
      set: function(key, val) {
        localStorage.setItem('village_' + key, JSON.stringify(val));
      }
    };

    var currentUser = Storage.get('user', null);
    if (!currentUser) {
      location.href = 'login.html';
    }

    var ROLES_MAP = {
      'township': { icon: '👔', name: '村主任', color: '#2E7D32' },
      'villager': { icon: '🏠', name: '村民', color: '#4CAF50' },
      'tourist': { icon: '🎒', name: '游客', color: '#2196F3' },
      'market': { icon: '🏪', name: '超市老板', color: '#FF9800' },
      'construction': { icon: '🏗️', name: '建筑公司', color: '#795548' },
      'teacher': { icon: '📚', name: '老师', color: '#9C27B0' },
      'student': { icon: '🎓', name: '大学生', color: '#00BCD4' },
      'lawyer': { icon: '⚖️', name: '律师', color: '#607D8B' },
      'truck': { icon: '🚛', name: '货运司机', color: '#8D6E63' },
      'carpool': { icon: '🚗', name: '顺风车', color: '#009688' },
      'massage': { icon: '💆', name: '按摩技师', color: '#E91E63' }
    };

    function toast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    function renderPage() {
      var container = document.getElementById('mainContent');
      var role = ROLES_MAP[currentUser.currentRole] || null;
      var roleText = '未选择角色';
      var roleCls = 'role-none';
      var roleTag = '<span class="role-badge role-none">❓ 未选择角色</span>';

      if (currentUser.currentRole && currentUser.currentRole !== 'none') {
        if (role) {
          roleText = role.name;
          roleTag = '<span class="role-badge role-active">' + role.icon + ' ' + role.name + '</span>';
        }
      }

      // 获取我的所有注册记录
      var regs = Storage.get('registrations', []);
      var myRegs = [];
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].accountId === currentUser.id) {
          myRegs.push(regs[i]);
        }
      }

      // 查找待我审核的（村主任角色）
      var pendingForMe = [];
      if (currentUser.currentRole === 'township') {
        // 查找注册身份为"村民"且状态为"待审核"的
        for (var j = 0; j < regs.length; j++) {
          if (regs[j].role === '村民' && regs[j].status === '待审核') {
            pendingForMe.push(regs[j]);
          }
        }
      }

      var html = '';

      // 用户信息卡
      html += '<div class="user-card">' +
        '<div class="user-avatar">👤</div>' +
        '<div class="user-info">' +
        '<div class="user-name">' + currentUser.account + '</div>' +
        '<div class="user-account">账号：' + currentUser.account + '</div>' +
        roleTag +
        '</div>' +
        '</div>';

      // 待审核提示
      if (myRegs.length > 0) {
        var latestReg = myRegs[0];
        if (latestReg.status === '待审核') {
          html += '<div class="pending-notice">⏳ 您的「' + latestReg.role + '」申请正在审核中，请耐心等待。<br>审核通过后您将自动获得相应功能权限。</div>';
        } else if (latestReg.status === '已拒绝') {
          html += '<div class="pending-notice">❌ 您的「' + latestReg.role + '」申请已被拒绝，如有疑问请联系管理员。</div>';
        }
      }

      // 村主任专属：我的村庄按钮
      if (currentUser.currentRole === 'township') {
        // 查找当前用户对应的村庄
        var myVillage = null;
        var villages = Storage.get('villages', []);
        for (var vi = 0; vi < villages.length; vi++) {
          if (villages[vi].chief && villages[vi].chief.name === currentUser.currentRoleName) {
            myVillage = villages[vi];
            break;
          }
        }
        // 没有村庄 → 创建入口
        if (!myVillage) {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄</div>' +
            '<div style="text-align:center;padding:10px 0;">' +
            '<div style="font-size:48px;margin-bottom:8px;">🏡</div>' +
            '<div style="font-size:14px;color:#888;margin-bottom:12px;">您还没有村庄信息</div>' +
            '<button onclick="openVillageModal(true)" style="padding:10px 24px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;">创建村庄</button>' +
            '</div>' +
            '</div>';
        } else {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄「' + myVillage.name + '」</div>' +
            '<div style="font-size:13px;color:#666;margin-bottom:12px;">' +
            '📍 ' + (myVillage.province || '') + ' ' + (myVillage.city || '') + '<br>' +
            '📞 村长：' + (myVillage.chief ? myVillage.chief.name : '未知') + ' ' + (myVillage.chief && myVillage.chief.phone ? myVillage.chief.phone : '') + '<br>' +
            '👥 人口：' + (myVillage.population || '待完善') + ' 人<br>' +
            '📐 总面积：' + (myVillage.totalArea || '待完善') + ' 亩 | 农田：' + (myVillage.farmlandArea || '待完善') + ' 亩<br>' +
            '🏠 地址：' + (myVillage.address || '待完善') + '<br>' +
            (myVillage.description ? '📝 ' + myVillage.description + '<br>' : '') +
            (myVillage.images && myVillage.images.length ? '<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">' + myVillage.images.map(function(img){ return '<img src="' + img + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">'; }).join('') + '</div>' : '') +
            '</div>' +
            '<button onclick="openVillageModal(false)" style="width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:8px;">✏️ 编辑村庄信息</button>' +
            '</div>';
        }

        // 村主任审核村民申请
        html += '<div class="village-panel">' +
          '<div class="village-panel-title">👥 村民加入审核' +
          (pendingForMe.length > 0 ? ' <span style="background:#F44336;color:white;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:bold;">' + pendingForMe.length + '</span>' : '') +
          '</div>';

        if (pendingForMe.length === 0) {
          html += '<div class="empty-state">暂无待审核的村民申请</div>';
        } else {
          for (var pi = 0; pi < pendingForMe.length; pi++) {
            var p = pendingForMe[pi];
            html += '<div class="audit-item">' +
              '<div class="audit-name">🏠 ' + (p.name || '未知') + '</div>' +
              '<div class="audit-info">村庄：' + (p.village || '未知') + ' | 手机：' + (p.phone || '未知') + '</div>' +
              '<div class="audit-info">申请时间：' + (p.applyTime ? new Date(p.applyTime).toLocaleDateString('zh-CN') : '') + '</div>' +
              '<div class="audit-actions">' +
              '<button class="btn-a-approve" onclick="approveVillager(\'' + p.id + '\')">✅ 通过</button>' +
              '<button class="btn-a-reject" onclick="rejectVillager(\'' + p.id + '\')">❌ 拒绝</button>' +
              '</div>' +
              '</div>';
          }
        }
        html += '</div>';
      }

      // 菜单
      html += '<div class="section-title">快捷功能</div>';
      html += '<div class="menu-list">';

      if (currentUser.currentRole === 'none') {
        html += '<div class="menu-item" onclick="location.href=\'select-role.html\'">' +
          '<span class="menu-icon\">🎯</span><span class="menu-text">选择/注册角色</span><span class="menu-arrow">›</span></div>';
      } else {
        html += '<div class="menu-item" onclick="location.href=\'select-role.html\'">' +
          '<span class="menu-icon">🔄</span><span class="menu-text">切换角色</span><span class="menu-arrow">›</span></div>';
      }

      html += '<div class="menu-item" onclick="location.href=\'index.html\'">' +
        '<span class="menu-icon">🏠</span><span class="menu-text">返回首页</span><span class="menu-arrow">›</span></div>' +
        '</div>';

      // 我的注册记录
      if (myRegs.length > 0) {
        html += '<div class="section-title">我的注册</div><div class="menu-list">';
        for (var ri = 0; ri < myRegs.length; ri++) {
          var r = myRegs[ri];
          var rMap = ROLES_MAP[r.role] ? ROLES_MAP[r.role] : { icon: '👤', name: r.role };
          var statusCls = r.status === '已通过' ? 'role-active' : (r.status === '已拒绝' ? 'role-rejected' : 'role-pending');
          var statusIcon = r.status === '已通过' ? '✅' : (r.status === '已拒绝' ? '❌' : '⏳');
          html += '<div class="menu-item">' +
            '<span class="menu-icon">' + rMap.icon + '</span>' +
            '<span class="menu-text">' + r.role + (r.name ? ' - ' + r.name : '') + '</span>' +
            '<span class="role-badge ' + statusCls + '">' + statusIcon + ' ' + r.status + '</span>' +
            '</div>';
        }
        html += '</div>';
      }

      // 退出
      html += '<div style="margin-top:16px;">' +
        '<button class="btn-logout" onclick="doLogout()">🚪 退出登录</button>' +
        '</div>';

      container.innerHTML = html;
    }

    // 村主任审核村民
    function approveVillager(regId) {
      var regs = Storage.get('registrations', []);
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].id === regId) {
          regs[i].status = '已通过';
          regs[i].reviewTime = Date.now();
          break;
        }
      }
      Storage.set('registrations', regs);
      toast('已通过！该村民已激活');
      renderPage();
    }

    function rejectVillager(regId) {
      if (!confirm('确定拒绝该村民申请？')) return;
      var regs = Storage.get('registrations', []);
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].id === regId) {
          regs[i].status = '已拒绝';
          regs[i].reviewTime = Date.now();
          break;
        }
      }
      Storage.set('registrations', regs);
      toast('已拒绝');
      renderPage();
    }

    // 获取当前村主任的村庄
    function getMyVillage() {
      var villages = Storage.get('villages', []);
      for (var vi = 0; vi < villages.length; vi++) {
        if (villages[vi].chief && villages[vi].chief.name === currentUser.currentRoleName) {
          return { village: villages[vi], index: vi };
        }
      }
      return null;
    }

    // 打开村庄编辑弹窗
    function openVillageModal(isCreate) {
      window._villageIsCreate = isCreate;
      var data = null;
      if (!isCreate) {
        var r = getMyVillage();
        if (!r) { toast('未找到村庄'); return; }
        data = r.village;
      }
      var v = data || {};
      window._villageImages = data && data.images ? data.images.slice() : [];
      var html = '<div class="modal-overlay" id="villageModal" onclick="closeVillageModal(event)">'
 +
        '<div class="modal-box" onclick="event.stopPropagation()">' +
        '<div class="modal-title">' + (isCreate ? '🏡 创建村庄' : '✏️ 编辑村庄信息') + '</div>' +
        '<div class="modal-form-group"><label class="modal-label"><span class="req">*</span> 村庄名称</label><input class="modal-input" id="vf_name" value="' + (v.name||'') + '" placeholder="请输入村庄名称"></div>' +
        '<div class="modal-form-group"><label class="modal-label">省份</label><input class="modal-input" id="vf_province" value="' + (v.province||'') + '" placeholder="如：江苏省"></div>' +
        '<div class="modal-form-group"><label class="modal-label">城市</label><input class="modal-input" id="vf_city" value="' + (v.city||'') + '" placeholder="如：苏州市"></div>' +
        '<div class="modal-form-group"><label class="modal-label">人口（人）</label><input class="modal-input" id="vf_population" value="' + (v.population||'') + '" placeholder="如：1200"></div>' +
        '<div class="modal-form-group"><label class="modal-label">总面积（亩）</label><input class="modal-input" id="vf_totalArea" value="' + (v.totalArea||'') + '" placeholder="如：5000"></div>' +
        '<div class="modal-form-group"><label class="modal-label">农田面积（亩）</label><input class="modal-input" id="vf_farmlandArea" value="' + (v.farmlandArea||'') + '" placeholder="如：3000"></div>' +
        '<div class="modal-form-group"><label class="modal-label">村委地址</label><input class="modal-input" id="vf_address" value="' + (v.address||'') + '" placeholder="村委办公地址"></div>' +
        '<div class="modal-form-group"><label class="modal-label">村长电话</label><input class="modal-input" id="vf_phone" value="' + (v.phone||'') + '" placeholder="联系电话"></div>' +
        '<div class="modal-form-group"><label class="modal-label">村庄简介</label><textarea class="modal-textarea" id="vf_description" placeholder="介绍村庄特色、产业等">' + (v.description||'') + '</textarea></div>' +
        '<div class="modal-form-group"><label class="modal-label">村庄图片（最多6张）</label>' +
        '<input type="file" accept="image/*" multiple id="vf_images" onchange="previewVillageImages()" style="display:none">' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;" id="vf_imagePreview"></div>' +
        '<button type="button" onclick="document.getElementById(\'vf_images\').click()" style="margin-top:8px;padding:8px 16px;background:#f5f5f5;color:#666;border:none;border-radius:8px;font-size:13px;cursor:pointer">📷 选择图片</button>' +
        '</div>' +
        '<button class="modal-btn modal-btn-save" onclick="saveVillage()">💾 保存</button>' +
        '<button class="modal-btn modal-btn-cancel" onclick="closeVillageModal()">取消</button>' +
        '</div></div>';
      var wrapper = document.createElement('div');
      wrapper.id = 'villageModalWrapper';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);
      setTimeout(function() { renderVillageImagePreview(); }, 100);
    }

    function closeVillageModal(e) {
      if (e && e.target && e.target.id !== 'villageModal') return;
      var w = document.getElementById('villageModalWrapper');
      if (w) w.remove();
    }

    function saveVillage() {
      var name = document.getElementById('vf_name').value.trim();
      if (!name) { toast('请输入村庄名称'); return; }
      var villages = Storage.get('villages', []);
      if (window._villageIsCreate) {
        villages.push({
          id: 'v_' + Date.now(),
          name: name,
          province: document.getElementById('vf_province').value.trim(),
          city: document.getElementById('vf_city').value.trim(),
          population: document.getElementById('vf_population').value.trim(),
          totalArea: document.getElementById('vf_totalArea').value.trim(),
          farmlandArea: document.getElementById('vf_farmlandArea').value.trim(),
          address: document.getElementById('vf_address').value.trim(),
          description: document.getElementById('vf_description').value.trim(),
          chief: { name: currentUser.currentRoleName || currentUser.account, phone: document.getElementById('vf_phone').value.trim() },
          images: window._villageImages || [],
          createTime: Date.now()
        });
        toast('村庄创建成功！');
      } else {
        var r = getMyVillage();
        if (!r) { toast('未找到村庄'); return; }
        var idx = r.index;
        villages[idx].name = name;
        villages[idx].province = document.getElementById('vf_province').value.trim();
        villages[idx].city = document.getElementById('vf_city').value.trim();
        villages[idx].population = document.getElementById('vf_population').value.trim();
        villages[idx].totalArea = document.getElementById('vf_totalArea').value.trim();
        villages[idx].farmlandArea = document.getElementById('vf_farmlandArea').value.trim();
        villages[idx].address = document.getElementById('vf_address').value.trim();
        villages[idx].description = document.getElementById('vf_description').value.trim();
        villages[idx].chief.phone = document.getElementById('vf_phone').value.trim();
        villages[idx].images = window._villageImages || [];
        toast('村庄信息已更新！');
      }
      Storage.set('villages', villages);
      closeVillageModal();
      renderPage();
    }

    // 图片选择 + Canvas压缩
    function previewVillageImages() {
      var files = document.getElementById('vf_images').files;
      if (!files || !files.length) return;
      var max = 6;
      var existing = window._villageImages || [];
      if (existing.length + files.length > max) {
        toast('最多上传6张图片');
        return;
      }
      var loaded = 0;
      for (var fi = 0; fi < files.length; fi++) {
        (function(file) {
          var reader = new FileReader();
          reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
              var canvas = document.createElement('canvas');
              var ctx = canvas.getContext('2d');
              var w = img.width, h = img.height;
              var maxDim = 800;
              if (w > maxDim || h > maxDim) {
                if (w > h) { h = h * maxDim / w; w = maxDim; }
                else { w = w * maxDim / h; h = maxDim; }
              }
              canvas.width = w; canvas.height = h;
              ctx.drawImage(img, 0, 0, w, h);
              var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
              if (dataUrl.length > 200000) {
                dataUrl = canvas.toDataURL('image/jpeg', 0.5);
              }
              window._villageImages = window._villageImages || [];
              window._villageImages.push(dataUrl);
              renderVillageImagePreview();
              loaded++;
              if (loaded === files.length) {
                document.getElementById('vf_images').value = '';
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        })(files[fi]);
      }
    }

    // 渲染图片预览
    function renderVillageImagePreview() {
      var imgs = window._villageImages || [];
      var html = '';
      for (var i = 0; i < imgs.length; i++) {
        html += '<div style="position:relative;display:inline-block;margin:4px;">' +
          '<img src="' + imgs[i] + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #e0e0e0;">' +
          '<div onclick="removeVillageImg(' + i + ')" style="position:absolute;top:-8px;right:-8px;background:#F44336;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.3)">×</div>' +
          '</div>';
      }
      var preview = document.getElementById('vf_imagePreview');
      if (preview) preview.innerHTML = html;
    }

    // 删除某张图片
    function removeVillageImg(idx) {
      window._villageImages = window._villageImages || [];
      window._villageImages.splice(idx, 1);
      renderVillageImagePreview();
    }

    function doLogout() {
      if (!confirm('确定退出登录？')) return;
      Storage.set('user', null);
      location.href = 'login.html';
    }

    renderPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 村庄平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      color: white;
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-title { font-size: 18px; font-weight: bold; }
    .header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }

    /* 用户信息卡 */
    .user-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-avatar { font-size: 52px; }
    .user-info { flex: 1; }
    .user-name { font-size: 17px; font-weight: bold; color: #222; }
    .user-account { font-size: 12px; color: #999; margin-top: 3px; }
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 6px;
    }
    .role-none { background: #f5f5f5; color: #999; }
    .role-active { background: #E8F5E9; color: #2E7D32; }
    .role-pending { background: #FFF3E0; color: #E65100; }

    /* 快捷功能 */
    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #888;
      margin-bottom: 10px;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .menu-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #f9f9f9; }
    .menu-icon { font-size: 22px; margin-right: 12px; }
    .menu-text { flex: 1; font-size: 15px; color: #333; }
    .menu-arrow { font-size: 18px; color: #ccc; }
    .menu-badge {
      background: #F44336;
      color: white;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-right: 8px;
      font-weight: bold;
    }

    /* 村庄管理面板 */
    .village-panel {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .village-panel-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 审核列表项 */
    .audit-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #FF9800;
    }
    .audit-item.approved { border-left-color: #4CAF50; }
    .audit-item.rejected { border-left-color: #F44336; }
    .audit-name { font-size: 14px; font-weight: bold; color: #333; }
    .audit-info { font-size: 12px; color: #888; margin: 3px 0; }
    .audit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .audit-actions button {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-a-approve { background: #4CAF50; color: white; }
    .btn-a-reject { background: #F44336; color: white; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 28px;
      color: #bbb;
      font-size: 14px;
    }

    /* 注册审核提示 */
    .pending-notice {
      background: #FFF8E1;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #795548;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* 退出按钮 */
    .btn-logout {
      width: 100%;
      padding: 13px;
      background: white;
      color: #F44336;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">个人中心</span>
    <span style="width:40px"></span>
  </div>

  <div class="container" id="mainContent">
    加载中...
  </div>

  <script>
    var Storage = {
      get: function(key, defaultVal) {
        try {
          var v = localStorage.getItem(key);
          return v ? JSON.parse(v) : defaultVal;
        } catch(e) { return defaultVal; }
      },
      set: function(key, val) {
        localStorage.setItem(key, JSON.stringify(val));
      }
    };

    var currentUser = Storage.get('village_user', null);
    if (!currentUser) {
      location.href = 'login.html';
    }

    var ROLES_MAP = {
      'township': { icon: '👔', name: '村主任', color: '#2E7D32' },
      'villager': { icon: '🏠', name: '村民', color: '#4CAF50' },
      'tourist': { icon: '🎒', name: '游客', color: '#2196F3' },
      'market': { icon: '🏪', name: '超市老板', color: '#FF9800' },
      'construction': { icon: '🏗️', name: '建筑公司', color: '#795548' },
      'teacher': { icon: '📚', name: '老师', color: '#9C27B0' },
      'student': { icon: '🎓', name: '大学生', color: '#00BCD4' },
      'lawyer': { icon: '⚖️', name: '律师', color: '#607D8B' },
      'truck': { icon: '🚛', name: '货运司机', color: '#8D6E63' },
      'carpool': { icon: '🚗', name: '顺风车', color: '#009688' },
      'massage': { icon: '💆', name: '按摩技师', color: '#E91E63' }
    };

    function toast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    function renderPage() {
      var container = document.getElementById('mainContent');
      var role = ROLES_MAP[currentUser.currentRole] || null;
      var roleText = '未选择角色';
      var roleCls = 'role-none';
      var roleTag = '<span class="role-badge role-none">❓ 未选择角色</span>';

      if (currentUser.currentRole && currentUser.currentRole !== 'none') {
        if (role) {
          roleText = role.name;
          roleTag = '<span class="role-badge role-active">' + role.icon + ' ' + role.name + '</span>';
        }
      }

      // 获取我的所有注册记录
      var regs = Storage.get('village_registrations', []);
      var myRegs = [];
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].accountId === currentUser.id) {
          myRegs.push(regs[i]);
        }
      }

      // 查找待我审核的（村主任角色）
      var pendingForMe = [];
      if (currentUser.currentRole === 'township') {
        // 查找注册身份为"村民"且状态为"待审核"的
        for (var j = 0; j < regs.length; j++) {
          if (regs[j].role === '村民' && regs[j].status === '待审核') {
            pendingForMe.push(regs[j]);
          }
        }
      }

      var html = '';

      // 用户信息卡
      html += '<div class="user-card">' +
        '<div class="user-avatar">👤</div>' +
        '<div class="user-info">' +
        '<div class="user-name">' + currentUser.account + '</div>' +
        '<div class="user-account">账号：' + currentUser.account + '</div>' +
        roleTag +
        '</div>' +
        '</div>';

      // 待审核提示
      if (myRegs.length > 0) {
        var latestReg = myRegs[0];
        if (latestReg.status === '待审核') {
          html += '<div class="pending-notice">⏳ 您的「' + latestReg.role + '」申请正在审核中，请耐心等待。<br>审核通过后您将自动获得相应功能权限。</div>';
        } else if (latestReg.status === '已拒绝') {
          html += '<div class="pending-notice">❌ 您的「' + latestReg.role + '」申请已被拒绝，如有疑问请联系管理员。</div>';
        }
      }

      // 村主任专属：我的村庄按钮
      if (currentUser.currentRole === 'township') {
        // 查找当前用户对应的村庄
        var myVillage = null;
        var villages = Storage.get('villages', []);
        for (var vi = 0; vi < villages.length; vi++) {
          if (villages[vi].chief && villages[vi].chief.name === currentUser.currentRoleName) {
            myVillage = villages[vi];
            break;
          }
        }
        // 没有村庄 → 创建入口
        if (!myVillage) {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄</div>' +
            '<div style="text-align:center;padding:10px 0;">' +
            '<div style="font-size:48px;margin-bottom:8px;">🏡</div>' +
            '<div style="font-size:14px;color:#888;margin-bottom:12px;">您还没有村庄信息</div>' +
            '<button onclick="createMyVillage()" style="padding:10px 24px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;">创建村庄</button>' +
            '</div>' +
            '</div>';
        } else {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄「' + myVillage.name + '」</div>' +
            '<div style="font-size:13px;color:#666;margin-bottom:12px;">' +
            '📍 ' + (myVillage.province || '') + ' ' + (myVillage.city || '') + '<br>' +
            '📞 村长：' + (myVillage.chief ? myVillage.chief.name : '未知') + ' ' + (myVillage.chief && myVillage.chief.phone ? myVillage.chief.phone : '') + '<br>' +
            '👥 人口：' + (myVillage.population || '待完善') + '</div>' +
            '<button onclick="editMyVillage()" style="width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:8px;">✏️ 编辑村庄信息</button>' +
            '</div>';
        }

        // 村主任审核村民申请
        html += '<div class="village-panel">' +
          '<div class="village-panel-title">👥 村民加入审核' +
          (pendingForMe.length > 0 ? ' <span style="background:#F44336;color:white;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:bold;">' + pendingForMe.length + '</span>' : '') +
          '</div>';

        if (pendingForMe.length === 0) {
          html += '<div class="empty-state">暂无待审核的村民申请</div>';
        } else {
          for (var pi = 0; pi < pendingForMe.length; pi++) {
            var p = pendingForMe[pi];
            html += '<div class="audit-item">' +
              '<div class="audit-name">🏠 ' + (p.name || '未知') + '</div>' +
              '<div class="audit-info">村庄：' + (p.village || '未知') + ' | 手机：' + (p.phone || '未知') + '</div>' +
              '<div class="audit-info">申请时间：' + (p.applyTime ? new Date(p.applyTime).toLocaleDateString('zh-CN') : '') + '</div>' +
              '<div class="audit-actions">' +
              '<button class="btn-a-approve" onclick="approveVillager(\'' + p.id + '\')">✅ 通过</button>' +
              '<button class="btn-a-reject" onclick="rejectVillager(\'' + p.id + '\')">❌ 拒绝</button>' +
              '</div>' +
              '</div>';
          }
        }
        html += '</div>';
      }

      // 菜单
      html += '<div class="section-title">快捷功能</div>';
      html += '<div class="menu-list">';

      if (currentUser.currentRole === 'none') {
        html += '<div class="menu-item" onclick="location.href=\'select-role.html\'">' +
          '<span class="menu-icon\">🎯</span><span class="menu-text">选择/注册角色</span><span class="menu-arrow">›</span></div>';
      } else {
        html += '<div class="menu-item" onclick="location.href=\'select-role.html\'">' +
          '<span class="menu-icon">🔄</span><span class="menu-text">切换角色</span><span class="menu-arrow">›</span></div>';
      }

      html += '<div class="menu-item" onclick="location.href=\'index.html\'">' +
        '<span class="menu-icon">🏠</span><span class="menu-text">返回首页</span><span class="menu-arrow">›</span></div>' +
        '</div>';

      // 我的注册记录
      if (myRegs.length > 0) {
        html += '<div class="section-title">我的注册</div><div class="menu-list">';
        for (var ri = 0; ri < myRegs.length; ri++) {
          var r = myRegs[ri];
          var rMap = ROLES_MAP[r.role] ? ROLES_MAP[r.role] : { icon: '👤', name: r.role };
          var statusCls = r.status === '已通过' ? 'role-active' : (r.status === '已拒绝' ? 'role-rejected' : 'role-pending');
          var statusIcon = r.status === '已通过' ? '✅' : (r.status === '已拒绝' ? '❌' : '⏳');
          html += '<div class="menu-item">' +
            '<span class="menu-icon">' + rMap.icon + '</span>' +
            '<span class="menu-text">' + r.role + (r.name ? ' - ' + r.name : '') + '</span>' +
            '<span class="role-badge ' + statusCls + '">' + statusIcon + ' ' + r.status + '</span>' +
            '</div>';
        }
        html += '</div>';
      }

      // 退出
      html += '<div style="margin-top:16px;">' +
        '<button class="btn-logout" onclick="doLogout()">🚪 退出登录</button>' +
        '</div>';

      container.innerHTML = html;
    }

    // 村主任审核村民
    function approveVillager(regId) {
      var regs = Storage.get('village_registrations', []);
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].id === regId) {
          regs[i].status = '已通过';
          regs[i].reviewTime = Date.now();
          break;
        }
      }
      Storage.set('village_registrations', regs);
      toast('已通过！该村民已激活');
      renderPage();
    }

    function rejectVillager(regId) {
      if (!confirm('确定拒绝该村民申请？')) return;
      var regs = Storage.get('village_registrations', []);
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].id === regId) {
          regs[i].status = '已拒绝';
          regs[i].reviewTime = Date.now();
          break;
        }
      }
      Storage.set('village_registrations', regs);
      toast('已拒绝');
      renderPage();
    }

    // 创建村庄（村主任）
    function createMyVillage() {
      var name = prompt('请输入村庄名称：');
      if (!name || !name.trim()) return;
      var province = prompt('请输入省份（选填）：') || '';
      var city = prompt('请输入城市（选填）：') || '';

      var villages = Storage.get('villages', []);
      villages.push({
        id: 'v_' + Date.now(),
        name: name.trim(),
        province: province.trim(),
        city: city.trim(),
        population: '',
        totalArea: '',
        farmlandArea: '',
        description: '',
        chief: { name: currentUser.currentRoleName || currentUser.account, phone: '' },
        images: [],
        createTime: Date.now()
      });
      Storage.set('villages', villages);
      toast('村庄创建成功！');
      renderPage();
    }

    // 编辑村庄（村主任）
    function editMyVillage() {
      var villages = Storage.get('villages', []);
      var myVillage = null;
      var myIdx = -1;
      for (var vi = 0; vi < villages.length; vi++) {
        if (villages[vi].chief && villages[vi].chief.name === currentUser.currentRoleName) {
          myVillage = villages[vi];
          myIdx = vi;
          break;
        }
      }
      if (!myVillage) { toast('未找到村庄'); return; }

      var name = prompt('村庄名称：', myVillage.name);
      if (name === null) return;
      var population = prompt('人口：', myVillage.population || '');
      if (population === null) return;
      var desc = prompt('村庄简介：', myVillage.description || '');
      if (desc === null) return;

      villages[myIdx].name = name.trim() || myVillage.name;
      villages[myIdx].population = population.trim();
      villages[myIdx].description = desc.trim();
      Storage.set('villages', villages);
      toast('村庄信息已更新！');
      renderPage();
    }

    function doLogout() {
      if (!confirm('确定退出登录？')) return;
      Storage.set('village_user', null);
      location.href = 'login.html';
    }

    renderPage();
  </script>
</body>
</html>
